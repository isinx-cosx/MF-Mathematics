<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 640" width="512" height="640">
  <defs>
    <!-- 亮青色波浪渐变 -->
    <linearGradient id="waveGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088bb"/>
    </linearGradient>

    <!-- 立方体顶面渐变（最亮面） -->
    <linearGradient id="cubeTop" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#2d5fa0"/>
    </linearGradient>

    <!-- 立方体左面渐变（中等亮度） -->
    <linearGradient id="cubeLeft" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2a5591"/>
      <stop offset="100%" stop-color="#1a365d"/>
    </linearGradient>

    <!-- 立方体右面渐变（最暗面） -->
    <linearGradient id="cubeRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#0d1b33"/>
    </linearGradient>

    <!-- 左侧竖笔渐变 -->
    <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#122847"/>
      <stop offset="100%" stop-color="#1a365d"/>
    </linearGradient>
  </defs>

  <!-- 白色背景 -->
  <rect width="512" height="640" fill="#ffffff"/>

  <!-- ================================================ -->
  <!-- 图标区域                                        -->
  <!--                                                 -->
  <!--   等距立方体（正六边形 + 前角点 F）：            -->
  <!--   T  = (256, 55)   — 顶部 / M 中心峰            -->
  <!--   TR = (395, 135)  — 右上 / M 右上角             -->
  <!--   BR = (395, 295)  — 右下 / M 右下脚             -->
  <!--   B  = (256, 375)  — 底部（不可见）              -->
  <!--   BL = (117, 295)  — 左下 / M 左下脚             -->
  <!--   TL = (117, 135)  — 左上 / M 左上角             -->
  <!--   F  = (256, 215)  — 前角点（立方体最近角）      -->
  <!--                                                 -->
  <!--   三个可见面：                                   -->
  <!--   顶面: T-TL-F-TR                                -->
  <!--   左面: T-F-BL-TL                                -->
  <!--   右面: T-TR-BR-F                                -->
  <!--                                                 -->
  <!--   M 的四笔：                                     -->
  <!--   左竖: TL→BL  (立方体棱线)                       -->
  <!--   左斜: BL→T   (左面对角线)【正弦波】             -->
  <!--   右斜: T→BR   (直线, 强调)                       -->
  <!--   右竖: BR→TR  (立方体棱线)                       -->
  <!-- ================================================ -->
  <g transform="translate(30, 48)">

    <!-- ===== 立方体三个可见面 ===== -->

    <!-- 顶面（最亮） -->
    <polygon points="256,55 117,135 256,215 395,135"
             fill="url(#cubeTop)" stroke="#1a365d" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- 左面（中等亮度） -->
    <polygon points="256,55 256,215 117,295 117,135"
             fill="url(#cubeLeft)" stroke="#1a365d" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- 右面（最暗） -->
    <polygon points="256,55 395,135 395,295 256,215"
             fill="url(#cubeRight)" stroke="#1a365d" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- ===== 右斜笔：T→BR 直线（M 的右侧斜线） ===== -->
    <!-- 穿过右面，从前角点附近经过 -->
    <line x1="256" y1="55" x2="395" y2="295"
          stroke="#0a1526" stroke-width="3.5" stroke-linecap="round"/>

    <!-- ===== 右竖笔加粗矩形（与左侧竖笔视觉匹配） ===== -->
    <rect x="386" y="135" width="21" height="160" rx="10.5" fill="url(#stemGrad)"/>

    <!-- ===== 左竖笔：TL→BL 立方体棱线 + 加粗 ===== -->
    <rect x="108" y="135" width="21" height="160" rx="10.5" fill="url(#stemGrad)"/>

    <!-- TL→BL 棱线强调 -->
    <line x1="117" y1="135" x2="117" y2="295"
          stroke="#122847" stroke-width="2" opacity="0.3"/>

    <!-- ===== 左斜笔：正弦波曲线 BL→T ===== -->
    <!-- 从左面底角到顶部，沿对角线振荡 1.5 周期 -->
    <!-- 对角线：BL(117,295)→T(256,55)，dx=139, dy=-240，长度≈277 -->
    <!-- 垂直于对角线振荡，振幅 24px -->
    <path d="M 118 295
             C 137 278, 157 288, 173 270
             C 189 252, 171 233, 170 213
             C 169 193, 186 181, 190 162
             C 194 143, 178 128, 186 110
             C 194 92, 213 81, 229 68
             C 245 55, 253 56, 256 55"
          fill="none" stroke="url(#waveGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- ===== 交汇高光 ===== -->
    <!-- 波与立方体在顶部 T 交汇 -->
    <circle cx="256" cy="55" r="13" fill="#ffffff" opacity="0.35"/>
    <circle cx="256" cy="55" r="6.5" fill="#00d4ff" opacity="0.85"/>

    <!-- 立方体前角 F 处的小装饰点 -->
    <circle cx="256" cy="215" r="3.5" fill="#1a365d" opacity="0.5"/>

  </g>

  <!-- ================================================ -->
  <!-- 文字区域                                         -->
  <!-- ================================================ -->
  <g transform="translate(256, 520)">
    <!-- 上排：MULTIFUNCTIONAL（轻字重） -->
    <text x="0" y="0"
          font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
          font-weight="300"
          font-size="27"
          letter-spacing="3.5"
          fill="#1a365d"
          text-anchor="middle">MULTIFUNCTIONAL</text>

    <!-- 分隔线（亮青色） -->
    <line x1="-110" y1="14" x2="110" y2="14"
          stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

    <!-- 下排：MATHEMATICS（粗字重） -->
    <text x="0" y="43"
          font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
          font-weight="600"
          font-size="31"
          letter-spacing="5.5"
          fill="#1a365d"
          text-anchor="middle">MATHEMATICS</text>

    <!-- 底部装饰短线 -->
    <rect x="-100" y="56" width="200" height="2.5" rx="1.25" fill="#00d4ff" opacity="0.55"/>
  </g>
</svg>
