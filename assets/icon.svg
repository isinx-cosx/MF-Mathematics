<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 640" width="512" height="512">
  <defs>
    <!-- 亮青色波浪渐变 -->
    <linearGradient id="waveGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>

    <!-- 立方体三个可见面的渐变 -->
    <!-- 顶面 — 最亮 -->
    <linearGradient id="cubeTop" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#2a5591"/>
    </linearGradient>
    <!-- 左面 — 中等 -->
    <linearGradient id="cubeLeft" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2a5591"/>
      <stop offset="100%" stop-color="#1a365d"/>
    </linearGradient>
    <!-- 右面 — 最暗 -->
    <linearGradient id="cubeRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#0f1f3a"/>
    </linearGradient>

    <!-- 左侧竖笔渐变 -->
    <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#234b7a"/>
    </linearGradient>
  </defs>

  <!-- 白色背景 -->
  <rect width="512" height="640" fill="#ffffff"/>

  <!-- ================================================ -->
  <!-- 图标区域：基于等距立方体六边形顶点                -->
  <!--                                                 -->
  <!--   六边形顶点（顺时针，自顶部起）：                -->
  <!--   T  = (256, 55)   — 顶部 / M 中心峰            -->
  <!--   TR = (392, 135)  — 右上 / M 右上角             -->
  <!--   BR = (392, 295)  — 右下 / M 右下脚             -->
  <!--   B  = (256, 375)  — 底部                        -->
  <!--   BL = (120, 295)  — 左下 / M 左下脚             -->
  <!--   TL = (120, 135)  — 左上 / M 左上角             -->
  <!--                                                 -->
  <!--   M 的四笔：                                     -->
  <!--   左竖: TL→BL  (120,135)→(120,295)              -->
  <!--   左斜: BL→T   (120,295)→(256,55)  【正弦波】    -->
  <!--   右斜: T→BR   (256,55)→(392,295)               -->
  <!--   右竖: BR→TR  (392,295)→(392,135)              -->
  <!-- ================================================ -->
  <g transform="translate(30, 35)">

    <!-- ===== 左竖笔（深蓝色粗杆） ===== -->
    <rect x="112" y="135" width="20" height="160" rx="10" fill="url(#stemGrad)"/>

    <!-- ===== 左斜笔：正弦波（亮青色，1.5 周期） ===== -->
    <!-- 沿立方体棱线 BL(132,295) → T(256,55) -->
    <!-- 对角线 dx=124, dy=-240, 长度≈270 -->
    <!-- 振荡幅 26px 垂直于对角线，1.5 周期 -->
    <path d="M 132 295
             C 148 280, 166 290, 181 274
             C 196 258, 178 240, 177 220
             C 176 200, 195 188, 197 170
             C 199 152, 185 135, 192 115
             C 199 95, 218 85, 233 72
             C 248 59, 254 57, 256 55"
          fill="none" stroke="url(#waveGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- ===== 立方体三个可见面（深蓝色等距投影） ===== -->

    <!-- 深度方向顶点：每个正面顶点后退 dx=-48, dy=-24 -->
    <!-- T' =(208,31)  TR'=(344,111)  BR'=(344,271)  B'=(208,351)  BL'=(72,271)  TL'=(72,111) -->

    <!-- 立方体顶面 -->
    <polygon points="256,55 392,135 344,111 208,31"
             fill="url(#cubeTop)" stroke="#1a365d" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- 立方体左面（面向左下） -->
    <polygon points="256,55 392,295 344,271 208,31"
             fill="url(#cubeLeft)" stroke="#1a365d" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- 立方体右面（面向右下） — 最暗 -->
    <polygon points="256,55 392,135 392,295 344,271"
             fill="url(#cubeRight)" stroke="#1a365d" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- ===== 强调构成 M 右半的棱线 ===== -->
    <!-- 右斜笔：T→BR（深色强调） -->
    <line x1="256" y1="55" x2="392" y2="295"
          stroke="#0a1526" stroke-width="3.5" stroke-linecap="round"/>

    <!-- 右竖笔：BR→TR（深色强调 + 视觉加粗） -->
    <line x1="392" y1="295" x2="392" y2="135"
          stroke="#0a1526" stroke-width="3.5" stroke-linecap="round"/>

    <!-- 右竖笔辅助加粗矩形（与左竖笔视觉匹配） -->
    <rect x="383" y="135" width="20" height="160" rx="10" fill="url(#stemGrad)"/>

    <!-- ===== 左斜笔下方: 立方体棱线 TL→BL (作参考线) ===== -->
    <line x1="120" y1="135" x2="120" y2="295"
          stroke="#1a365d" stroke-width="2" opacity="0.3"/>

    <!-- ===== 交汇点高光 ===== -->
    <circle cx="256" cy="55" r="12" fill="#ffffff" opacity="0.35"/>
    <circle cx="256" cy="55" r="6" fill="#00d4ff" opacity="0.8"/>

  </g>

  <!-- ================================================ -->
  <!-- 文字区域                                         -->
  <!-- ================================================ -->
  <g transform="translate(256, 515)">
    <!-- 上排文字：MULTIFUNCTIONAL -->
    <text x="0" y="0"
          font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
          font-weight="300"
          font-size="27"
          letter-spacing="3.5"
          fill="#1a365d"
          text-anchor="middle">MULTIFUNCTIONAL</text>

    <!-- 分隔符（亮青色细线） -->
    <line x1="-105" y1="13" x2="105" y2="13"
          stroke="#00d4ff" stroke-width="1.2" opacity="0.45"/>

    <!-- 下排文字：MATHEMATICS -->
    <text x="0" y="42"
          font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif"
          font-weight="600"
          font-size="31"
          letter-spacing="5.5"
          fill="#1a365d"
          text-anchor="middle">MATHEMATICS</text>

    <!-- 底部亮青色装饰线 -->
    <rect x="-95" y="55" width="190" height="2.5" rx="1.25" fill="#00d4ff" opacity="0.55"/>
  </g>
</svg>
