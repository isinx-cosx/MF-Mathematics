# ═══════════════════════════════════════════════════════════
#  MF_AI 模型映射配置（用户可编辑）
# ═══════════════════════════════════════════════════════════

# 自定义 API 端点（可选，覆盖默认 DeepSeek 地址）
# 示例: https://api.deepseek.com/anthropic
api_base: "https://api.deepseek.com"

# 默认模型 — 未指定模型或 role 未命中时的回退
default_model: "deepseek-v4-pro"

# 上下文长度（token 数，仅记录用，不影响实际调用）
context_length: 1048576  # 1M

# ── 角色 → 实际模型映射 ─────────────────────────────────
model_map:
  Sonnet:   "deepseek-v4-pro"
  Opus:     "deepseek-v4-pro"
  Haiku:    "deepseek-v4-pro"
  Fable:    "deepseek-v4-pro"
  Mythos:   "deepseek-v4-pro"
  Chat:     "deepseek-chat"
  Reasoner: "deepseek-reasoner"

# ── 各模型独立参数 ──────────────────────────────────────
model_params:
  deepseek-v4-pro:
    max_tokens: 8192
    temperature: 0.7
  deepseek-chat:
    max_tokens: 4096
    temperature: 0.7
  deepseek-reasoner:
    max_tokens: 8192
    temperature: 0.3
