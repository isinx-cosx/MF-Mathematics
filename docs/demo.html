<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MF-Mathematics · 在线演示</title>
<style>
/* ═══════════════════════════════════════════════════════
   CSS 变量 — 双主题（匹配 QSS light.qss / dark.qss）
   ═══════════════════════════════════════════════════════ */
[data-theme="light"] {
  --bg:#f8fafc;--surface:#fff;--surface2:#f9fafb;--border:#e2e8f0;--border-in:#d1d5db;
  --text:#1e293b;--text-title:#0f172a;--text-muted:#475569;--text-subtle:#94a3b8;
  --primary:#3b82f6;--primary-hv:#2563eb;--accent:#00d4ff;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.06);
  --btn-num-bg:#fff;--btn-num-text:#1e293b;
  --btn-op-bg:#eff6ff;--btn-op-text:#2563eb;--btn-op-border:#bfdbfe;
  --btn-eq-bg:#2563eb;--btn-eq-text:#fff;--btn-eq-border:#1d4ed8;
  --btn-func-bg:#f8fafc;--btn-func-text:#475569;
  --btn-ctrl-bg:#fef2f2;--btn-ctrl-text:#dc2626;--btn-ctrl-border:#fecaca;
  --btn-paren-bg:#f8fafc;--btn-paren-text:#6366f1;
  --btn-const-bg:#f0fdf4;--btn-const-text:#16a34a;--btn-const-border:#bbf7d0;
  --toolbar-bg:#fff;--toolbar-border:#e2e8f0;
  --topbar-bg:#fff;--topbar-border:#e2e8f0;
  --statusbar-bg:#fff;--lcd-bg:#f8fafc;--lcd-border:#cbd5e1;
  --input-bg:#fafafa;--result-bg:#f0f9ff;--result-border:#bfdbfe;
  --subnav-bg:#f8fafc;--subnav-hover:#e2e8f0;--subnav-active-bg:#dbeafe;--subnav-active-text:#1e40af;
  --plot-bg:#fcfdfd;--kb-bg:#fff;--kb-btn-bg:#fafafa;
}
[data-theme="dark"] {
  --bg:#1e1e2e;--surface:#252540;--surface2:#1e1e2e;--border:#313244;--border-in:#45475a;
  --text:#cdd6f4;--text-title:#cdd6f4;--text-muted:#a6adc8;--text-subtle:#6c7086;
  --primary:#3b82f6;--primary-hv:#2563eb;--accent:#89b4fa;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.3);
  --btn-num-bg:#313244;--btn-num-text:#cdd6f4;
  --btn-op-bg:#1e1e2e;--btn-op-text:#89b4fa;--btn-op-border:#313244;
  --btn-eq-bg:#89b4fa;--btn-eq-text:#1e1e2e;--btn-eq-border:#74c7ec;
  --btn-func-bg:#313244;--btn-func-text:#a6adc8;
  --btn-ctrl-bg:#2a1616;--btn-ctrl-text:#f38ba8;--btn-ctrl-border:#542121;
  --btn-paren-bg:#313244;--btn-paren-text:#b4befe;
  --btn-const-bg:#1a2a1a;--btn-const-text:#a6e3a1;--btn-const-border:#2a4a2a;
  --toolbar-bg:#252540;--toolbar-border:#313244;
  --topbar-bg:#181825;--topbar-border:#313244;
  --statusbar-bg:#252540;--lcd-bg:#11111b;--lcd-border:#45475a;
  --input-bg:#1e1e2e;--result-bg:#1e2a3a;--result-border:#313244;
  --subnav-bg:#1e1e2e;--subnav-hover:#313244;--subnav-active-bg:#1e3a5f;--subnav-active-text:#93c5fd;
  --plot-bg:#181825;--kb-bg:#252540;--kb-btn-bg:#313244;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
}
#app-shell{max-width:1100px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* ── Topbar（匹配 customTitleBar）── */
#topbar{
  background:var(--topbar-bg);border-bottom:1px solid var(--topbar-border);
  padding:0 20px;height:44px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
#topbar .brand{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
#topbar .brand .logo{width:28px;height:28px;background:var(--primary);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px}
#topbar .actions{display:flex;align-items:center;gap:8px}
#topbar .actions button,#topbar .actions a{
  font-size:12px;padding:5px 12px;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--text-muted);cursor:pointer;text-decoration:none;
  font-family:inherit;transition:all .15s;
}
#topbar .actions button:hover,#topbar .actions a:hover{background:var(--subnav-hover);color:var(--text)}

/* ── 工具栏（匹配 QToolBar）── */
#toolbar{
  background:var(--toolbar-bg);border-bottom:1px solid var(--toolbar-border);
  padding:0 16px;height:48px;display:flex;align-items:center;gap:12px;flex-shrink:0;
  overflow-x:auto;
}
#toolbar .mode-tabs{display:flex;gap:2px}
#toolbar .mode-tabs button{
  padding:8px 18px;font-size:13px;font-weight:600;border:1px solid transparent;
  border-radius:6px;background:transparent;color:var(--text-muted);cursor:pointer;
  font-family:inherit;transition:all .15s;
}
#toolbar .mode-tabs button:hover{background:var(--subnav-hover)}
#toolbar .mode-tabs button.active{
  background:var(--subnav-active-bg);color:var(--subnav-active-text);
  border-color:var(--primary);font-weight:700;
}
#toolbar .sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
#toolbar .tool-btn{
  font-size:13px;padding:6px 14px;border:1px solid transparent;border-radius:6px;
  background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;
  white-space:nowrap;transition:all .15s;
}
#toolbar .tool-btn:hover{background:var(--subnav-hover);color:var(--text)}
#toolbar .spacer{flex:1}

/* ── 主区域 ── */
#main-area{display:flex;flex:1;min-height:0}

/* ── 子模式侧边导航（匹配 QComboBox）── */
#subnav{
  width:180px;flex-shrink:0;background:var(--subnav-bg);border-right:1px solid var(--border);
  padding:8px 0;overflow-y:auto;
}
#subnav .subnav-item{
  display:block;width:100%;padding:9px 16px;font-size:13px;text-align:left;
  border:none;background:transparent;color:var(--text-muted);cursor:pointer;
  font-family:inherit;transition:all .12s;border-left:3px solid transparent;
}
#subnav .subnav-item:hover{background:var(--subnav-hover);color:var(--text)}
#subnav .subnav-item.active{
  background:var(--subnav-active-bg);color:var(--subnav-active-text);
  border-left-color:var(--primary);font-weight:600;
}

/* ── 工作区 ── */
#workspace{flex:1;padding:20px 24px;overflow-y:auto}
.workspace-header{margin-bottom:16px}
.workspace-header .ws-title{font-size:20px;font-weight:600;color:var(--text-title)}
.workspace-header .ws-desc{font-size:14px;color:var(--text-muted);margin-top:4px}

/* work_card */
.work-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.work-card h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px}

/* ── LCD ── */
.lcd{background:var(--lcd-bg);border:2px solid var(--lcd-border);border-radius:10px;padding:12px 16px;margin-bottom:12px;min-height:88px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end}
.lcd .expr{color:var(--text-subtle);font-size:16px;min-height:22px;word-break:break-all;font-family:monospace}
.lcd .result{color:var(--text-title);font-size:40px;font-weight:700;min-height:48px;word-break:break-all}
/* ── 按钮网格 ── */
.btn-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.btn-grid button{padding:12px 4px;font-size:15px;font-weight:500;border-radius:6px;cursor:pointer;transition:all .12s;min-height:44px;font-family:inherit}
.btn-num{background:var(--btn-num-bg);color:var(--btn-num-text);border:1px solid var(--border)!important}
.btn-num:hover{filter:brightness(.95)}.btn-num:active{filter:brightness(.9)}
.btn-op{background:var(--btn-op-bg);color:var(--btn-op-text);border:1px solid var(--btn-op-border)!important;font-weight:600}
.btn-op:hover{filter:brightness(.95)}.btn-op:active{filter:brightness(.9)}
.btn-eq{background:var(--btn-eq-bg);color:var(--btn-eq-text);border:1px solid var(--btn-eq-border)!important;font-size:18px;font-weight:700}
.btn-eq:hover{filter:brightness(.9)}.btn-eq:active{filter:brightness(.85)}
.btn-func{background:var(--btn-func-bg);color:var(--btn-func-text);border:1px solid var(--border)!important;font-size:13px}
.btn-func:hover{filter:brightness(.95)}.btn-func:active{filter:brightness(.9)}
.btn-ctrl{background:var(--btn-ctrl-bg);color:var(--btn-ctrl-text);border:1px solid var(--btn-ctrl-border)!important;font-size:14px;font-weight:600}
.btn-ctrl:hover{filter:brightness(.95)}.btn-ctrl:active{filter:brightness(.9)}
.btn-paren{background:var(--btn-paren-bg);color:var(--btn-paren-text);border:1px solid var(--border)!important;font-size:14px;font-weight:600}
.btn-paren:hover{filter:brightness(.95)}.btn-paren:active{filter:brightness(.9)}
.btn-const{background:var(--btn-const-bg);color:var(--btn-const-text);border:1px solid var(--btn-const-border)!important;font-size:13px;font-weight:600}
.btn-const:hover{filter:brightness(.95)}.btn-const:active{filter:brightness(.9)}

/* ── CalcBlock 风格 ── */
.calc-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.calc-row input{flex:1 1 200px;padding:10px 14px;font-size:15px;font-family:'Cascadia Code','Fira Code','Consolas',monospace;border:1px solid var(--border-in);border-radius:8px;outline:none;background:var(--input-bg);color:var(--text);transition:border-color .15s}
.calc-row input:focus{border-color:var(--primary);background:var(--surface)}
.calc-row select{padding:10px 14px;font-size:14px;border:1px solid var(--border-in);border-radius:8px;background:var(--input-bg);color:var(--text);outline:none;cursor:pointer;min-width:120px}
.calc-row select:focus{border-color:var(--primary)}
.btn-calc{padding:10px 20px;font-size:14px;font-weight:600;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;white-space:nowrap;transition:background .15s;font-family:inherit}
.btn-calc:hover{background:var(--primary-hv)}
.btn-calc-sm{padding:8px 16px;font-size:13px;font-weight:500;background:#e2e8f0;color:var(--text);border:none;border-radius:6px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-calc-sm:hover{background:#cbd5e1}
[data-theme="dark"] .btn-calc-sm{background:#45475a;color:#cdd6f4}
[data-theme="dark"] .btn-calc-sm:hover{background:#585b70}

.result-box{margin-top:14px;padding:14px 18px;background:var(--result-bg);border:1px solid var(--result-border);border-radius:10px;font-size:15px;color:var(--text);min-height:44px;line-height:1.6}
.result-box .steps{color:var(--text-muted);font-size:13px;margin-bottom:4px}
.result-box .answer{font-weight:700;color:var(--primary);font-size:18px;font-family:monospace}

/* 预设 */
.presets{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.presets button{padding:8px 16px;font-size:13px;font-weight:500;background:#eef2f6;color:var(--text-muted);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .15s;font-family:inherit}
.presets button:hover{background:#d0d9e6;color:var(--text)}
.presets button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
[data-theme="dark"] .presets button{background:#313244}
[data-theme="dark"] .presets button:hover{background:#45475a}

/* 绘图卡片 */
.plot-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.plot-card .header{padding:14px 24px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;color:var(--text-muted);display:flex;align-items:center;gap:8px}
.plot-card .header::before{content:'';display:inline-block;width:8px;height:8px;background:var(--accent);border-radius:50%}
canvas{display:block;width:100%;height:auto;background:var(--plot-bg)}

/* 矩阵输入 */
.matrix-grid{display:inline-grid;gap:4px;margin:8px 0}
.matrix-grid input{width:64px;padding:6px 8px;font-size:14px;text-align:center;font-family:monospace;border:1px solid var(--border-in);border-radius:4px;background:var(--input-bg);color:var(--text);outline:none}
.matrix-grid input:focus{border-color:var(--primary)}
.matrix-row{display:flex;gap:4px;align-items:center;margin-bottom:4px}

/* 键盘面板 */
#keyboard-panel{border-top:1px solid var(--border);background:var(--kb-bg);flex-shrink:0;display:none}
#keyboard-panel .kb-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 12px;overflow-x:auto}
#keyboard-panel .kb-tabs button{padding:6px 14px;font-size:12px;border:1px solid transparent;border-bottom:none;background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;border-radius:4px 4px 0 0;transition:all .12s}
#keyboard-panel .kb-tabs button.active{background:var(--surface);color:var(--text);border-color:var(--border);border-bottom:2px solid var(--primary)}
#keyboard-panel .kb-content{padding:8px 12px;display:flex;flex-wrap:wrap;gap:3px}
#keyboard-panel .kb-content button{padding:6px 10px;font-size:14px;font-family:monospace;background:var(--kb-btn-bg);color:var(--text);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .1s;min-width:38px}
#keyboard-panel .kb-content button:hover{background:var(--subnav-hover);border-color:var(--border-in)}

/* 占位卡片 */
.placeholder-card{background:var(--surface);border:2px dashed var(--border);border-radius:12px;padding:40px 24px;text-align:center;color:var(--text-subtle)}
.placeholder-card .ph-icon{font-size:48px;margin-bottom:12px}
.placeholder-card .ph-title{font-size:16px;font-weight:600;color:var(--text-muted);margin-bottom:6px}
.placeholder-card .ph-desc{font-size:13px;line-height:1.6}

/* ── 状态栏（匹配 QStatusBar）── */
#statusbar{
  background:var(--statusbar-bg);border-top:1px solid var(--border);
  padding:6px 16px;height:30px;display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:var(--text-subtle);flex-shrink:0;
}
#statusbar #brand-label{font-size:11px}

/* ── 响应式 ── */
@media(max-width:700px){
  #main-area{flex-direction:column}
  #subnav{width:100%;border-right:none;border-bottom:1px solid var(--border);padding:4px 0;overflow-x:auto;display:flex;flex-wrap:nowrap}
  #subnav .subnav-item{flex-shrink:0;width:auto;padding:8px 14px;font-size:12px;border-left:none;border-bottom:3px solid transparent}
  #subnav .subnav-item.active{border-left:none;border-bottom-color:var(--primary)}
  #workspace{padding:14px 10px}
  .btn-grid button{font-size:13px;padding:8px 2px;min-height:42px}
  .lcd .result{font-size:28px}
  .calc-row input{font-size:14px}
  #topbar .brand{font-size:14px}
  #toolbar{gap:4px;padding:4px 8px;height:auto;flex-wrap:wrap}
  #toolbar .mode-tabs button{padding:6px 12px;font-size:12px}
  #toolbar .tool-btn{font-size:12px;padding:5px 10px}
}
</style>
</head>
<body>
<div id="app-shell">
  <!-- ═══════════════ Topbar ═══════════════ -->
  <header id="topbar">
    <span class="brand"><span class="logo">M</span>MF-Mathematics</span>
    <span class="actions">
      <button id="themeToggle" title="切换主题">🌙 暗色</button>
      <a href="https://github.com/isinx-cosx/MF-Mathematics" target="_blank" rel="noopener">GitHub</a>
    </span>
  </header>

  <!-- ═══════════════ Toolbar ═══════════════ -->
  <nav id="toolbar">
    <div class="mode-tabs" id="modeTabs">
      <button data-tab="calc" class="active">计算</button>
      <button data-tab="plot">绘图</button>
    </div>
    <span class="sep"></span>
    <button class="tool-btn" id="btnKeyboard" title="数学键盘">⌨️ 键盘</button>
    <span class="spacer"></span>
    <span class="sep"></span>
    <button class="tool-btn" id="btnAbout">ℹ️ 关于</button>
  </nav>

  <!-- ═══════════════ Main Area ═══════════════ -->
  <div id="main-area">
    <aside id="subnav"></aside>
    <main id="workspace"></main>
  </div>

  <!-- ═══════════════ Keyboard Panel ═══════════════ -->
  <div id="keyboard-panel">
    <div class="kb-tabs" id="kbTabs">
      <button class="active" data-kb="basic">基本</button>
      <button data-kb="calc">微积分</button>
      <button data-kb="greek">希腊字母</button>
      <button data-kb="linalg">线性代数</button>
    </div>
    <div class="kb-content" id="kbContent"></div>
  </div>

  <!-- ═══════════════ Statusbar ═══════════════ -->
  <footer id="statusbar">
    <span id="statusMsg">就绪</span>
    <span id="brand-label">MF-Vis-Science · Open Studio</span>
  </footer>
</div>

<script>
(function(){'use strict';
/* ═══════════════════════════════════════════════════════════════
   §1 数学表达式解析器 — 递归下降（零 eval / new Function）
   保留自原 demo.html，已充分验证
   ═══════════════════════════════════════════════════════════════ */
var TOK_NUM=1,TOK_ID=2,TOK_OP=3,TOK_LP=4,TOK_RP=5,TOK_COMMA=6;

function preprocess(s){
  return s.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-').replace(/x²/g,'x^2');
}

function tokenize(s){
  var tokens=[],i=0,n=s.length;
  while(i<n){
    var c=s[i];
    if(/\s/.test(c)){i++;continue}
    if(/[0-9.]/.test(c)){var num='';while(i<n&&/[0-9.]/.test(s[i]))num+=s[i++];tokens.push({type:TOK_NUM,value:+num});continue}
    if(/[a-zA-Z]/.test(c)){var id='';while(i<n&&/[a-zA-Z0-9_]/.test(s[i]))id+=s[i++];tokens.push({type:TOK_ID,value:id});continue}
    if(c==='('){tokens.push({type:TOK_LP});i++;continue}
    if(c===')'){tokens.push({type:TOK_RP});i++;continue}
    if(c===','){tokens.push({type:TOK_COMMA});i++;continue}
    if(c==='^'){tokens.push({type:TOK_OP,value:'^',prec:4,right:true});i++;continue}
    if(c==='%'){tokens.push({type:TOK_OP,value:'%',prec:3});i++;continue}
    if(c==='*'){tokens.push({type:TOK_OP,value:'*',prec:3});i++;continue}
    if(c==='/'){tokens.push({type:TOK_OP,value:'/',prec:3});i++;continue}
    if(c==='+'){tokens.push({type:TOK_OP,value:'+',prec:2});i++;continue}
    if(c==='-'){
      var prev=tokens.length?tokens[tokens.length-1]:null;
      if(!prev||prev.type===TOK_OP||prev.type===TOK_LP||prev.type===TOK_COMMA){tokens.push({type:TOK_NUM,value:0});tokens.push({type:TOK_OP,value:'u-',prec:5,right:true})}
      else tokens.push({type:TOK_OP,value:'-',prec:2});
      i++;continue;
    }
    i++;
  }
  var out=[];
  for(var j=0;j<tokens.length;j++){
    var a=tokens[j],b=tokens[j+1];out.push(a);if(!b)break;
    var can=(a.type===TOK_NUM||a.type===TOK_RP||a.type===TOK_ID)&&(b.type===TOK_NUM||b.type===TOK_LP||b.type===TOK_ID);
    if(can&&!(a.type===TOK_NUM&&b.type===TOK_NUM))out.push({type:TOK_OP,value:'*',prec:3});
  }
  return out;
}

var CONSTANTS={pi:Math.PI,PI:Math.PI,e:Math.E,E:Math.E};
var FUNCTIONS={
  sin:Math.sin,cos:Math.cos,tan:Math.tan,
  csc:function(x){return 1/Math.sin(x)},sec:function(x){return 1/Math.cos(x)},cot:function(x){return 1/Math.tan(x)},
  asin:Math.asin,acos:Math.acos,atan:Math.atan,
  acsc:function(x){return Math.asin(1/x)},asec:function(x){return Math.acos(1/x)},acot:function(x){return Math.PI/2-Math.atan(x)},
  sinh:Math.sinh,cosh:Math.cosh,tanh:Math.tanh,
  asinh:Math.asinh,acosh:Math.acosh,atanh:Math.atanh,
  sqrt:Math.sqrt,cbrt:Math.cbrt,abs:Math.abs,log:Math.log,log10:Math.log10,log2:Math.log2,exp:Math.exp,
  factorial:function(n){if(n<0||n!==Math.floor(n))return NaN;var r=1;for(var k=2;k<=n;k++)r*=k;return r},
  sign:Math.sign,floor:Math.floor,ceil:Math.ceil,round:Math.round,pow:Math.pow,
};

function parse(tokens){
  var pos=0;
  function cur(){return tokens[pos]}
  function eat(t){if(t!==undefined&&cur().type!==t)throw Error('Expected token type '+t);pos++}
  function primary(){
    var t=cur();if(!t)throw Error('Unexpected end');
    if(t.type===TOK_NUM){eat();return t.value}
    if(t.type===TOK_LP){eat();var v=expr();eat(TOK_RP);return v}
    if(t.type===TOK_ID){eat();var id=t.value;
      if(cur()&&cur().type===TOK_LP){eat();var args=[];if(cur().type!==TOK_RP){args.push(expr());while(cur().type===TOK_COMMA){eat();args.push(expr())}}eat(TOK_RP);
        var fn=FUNCTIONS[id];if(fn)return fn.apply(null,args);throw Error('Unknown function: '+id);}
      if(CONSTANTS.hasOwnProperty(id))return CONSTANTS[id];
      if(id==='x')return NaN;throw Error('Unknown identifier: '+id);}
    throw Error('Unexpected token type: '+t.type);
  }
  function unary(){if(cur()&&cur().type===TOK_OP&&cur().value==='u-'){eat();return -unary()}return primary()}
  function binary(minPrec){
    var left=unary();
    while(cur()&&cur().type===TOK_OP&&cur().value!=='u-'){
      var op=cur();if(op.prec===undefined)break;
      var p=op.prec-(op.right?1:0);if(p<minPrec)break;eat();
      var right=binary(op.prec+(op.right?0:1));
      switch(op.value){case'+':left+=right;break;case'-':left-=right;break;case'*':left*=right;break;case'/':left/=right;break;case'^':left=Math.pow(left,right);break;case'%':left%=right;break;}
    }
    return left;
  }
  function expr(){return binary(0)}
  return expr();
}

function evaluate(str,xVal){
  var s=preprocess(str);
  var tokens=tokenize(s),t2=[];
  for(var i=0;i<tokens.length;i++){
    var t=tokens[i];
    if(xVal!==undefined&&t.type===TOK_ID&&t.value==='x')t2.push({type:TOK_NUM,value:xVal});
    else if(xVal===undefined&&t.type===TOK_ID&&t.value==='x')t2.push({type:TOK_NUM,value:1});
    else t2.push(t);
  }
  return parse(t2);
}
function containsX(str){return /\bx\b/.test(preprocess(str))}
function fmtResult(v){
  if(typeof v!=='number'||!isFinite(v))return '错误';
  if(Math.abs(v)>=1e12||(Math.abs(v)<1e-10&&v!==0))return v.toExponential(6);
  var s=v.toFixed(12);s=s.replace(/\.?0+$/,'');if(s==='')s='0';if(s.length>14)s=v.toPrecision(12);
  return s;
}

   §4 Canvas 绘图引擎 — 2D + 极坐标
   ═══════════════════════════════════════════════════════════════ */
function draw2D(fnExpr,canvasId){
  var canvas=document.getElementById(canvasId||'plotCanvas2D');
  if(!canvas)return;
  var ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1;
  var rect=canvas.parentElement.getBoundingClientRect();
  var w=Math.min(rect.width-4,1060),h=Math.round(w*0.52);
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);

  var pad={top:30,right:30,bottom:40,left:56};
  var pw=w-pad.left-pad.right,ph=h-pad.top-pad.bottom;
  var xMin=-5,xMax=5;
  var N=Math.min(800,Math.round(pw*2));
  var pts=[],yMin=Infinity,yMax=-Infinity;
  for(var i=0;i<=N;i++){
    var xv=xMin+(xMax-xMin)*i/N,yv;
    try{yv=evaluate(fnExpr,xv)}catch(_){continue}
    if(typeof yv!=='number'||!isFinite(yv)||Math.abs(yv)>1000)continue;
    if(pts.length>0&&Math.abs(yv-pts[pts.length-1].y)>100)pts.push(null);
    pts.push({x:xv,y:yv});if(yv<yMin)yMin=yv;if(yv>yMax)yMax=yv;
  }
  if(!isFinite(yMin)){yMin=-5;yMax=5}
  var yr=yMax-yMin||2;yMin-=yr*.1;yMax+=yr*.1;

  function tx(x){return pad.left+(x-xMin)/(xMax-xMin)*pw}
  function ty(y){return pad.top+(yMax-y)/(yMax-yMin)*ph}

  ctx.fillStyle=getTheme()==='dark'?'#181825':'#fcfdfd';ctx.fillRect(0,0,w,h);

  ctx.strokeStyle=getTheme()==='dark'?'#313244':'#e2e8f0';ctx.lineWidth=.5;
  var xStep=xMax-xMin>10?2:1;
  for(var gx=Math.ceil(xMin);gx<=xMax;gx+=xStep){ctx.beginPath();ctx.moveTo(tx(gx),pad.top);ctx.lineTo(tx(gx),h-pad.bottom);ctx.stroke()}
  var yExt=yMax-yMin,yStep=yExt>20?5:yExt>10?2:yExt>4?1:.5;
  for(var gy=Math.ceil(yMin/yStep)*yStep;gy<=yMax;gy+=yStep){ctx.beginPath();ctx.moveTo(pad.left,ty(gy));ctx.lineTo(w-pad.right,ty(gy));ctx.stroke()}

  var axisColor=getTheme()==='dark'?'#cdd6f4':'#1e293b';
  ctx.strokeStyle=axisColor;ctx.lineWidth=1.5;
  if(yMin<=0&&yMax>=0){ctx.beginPath();ctx.moveTo(pad.left,ty(0));ctx.lineTo(w-pad.right,ty(0));ctx.stroke()}
  if(xMin<=0&&xMax>=0){ctx.beginPath();ctx.moveTo(tx(0),pad.top);ctx.lineTo(tx(0),h-pad.bottom);ctx.stroke()}

  var tickColor=getTheme()==='dark'?'#a6adc8':'#64748b';
  ctx.fillStyle=tickColor;ctx.font='11px "Segoe UI",system-ui,sans-serif';ctx.textAlign='center';
  for(var txv=Math.ceil(xMin);txv<=xMax;txv+=xStep)ctx.fillText(txv,tx(txv),h-pad.bottom+16);
  ctx.textAlign='right';
  for(var tyv=Math.ceil(yMin/yStep)*yStep;tyv<=yMax;tyv+=yStep){if(Math.abs(tyv)<.001)continue;ctx.fillText(Number(tyv.toFixed(2)),pad.left-6,ty(tyv)+4)}

  ctx.fillStyle=axisColor;
  ctx.beginPath();var ax=w-pad.right+10,ay=ty(0);ctx.moveTo(ax,ay);ctx.lineTo(ax-8,ay-4);ctx.lineTo(ax-8,ay+4);ctx.fill();
  ctx.beginPath();var bx=tx(0),by=pad.top-10;ctx.moveTo(bx,by);ctx.lineTo(bx-4,by+8);ctx.lineTo(bx+4,by+8);ctx.fill();
  if(yMin>0||yMax<0){}else{ctx.textAlign='right';ctx.fillText('O',tx(0)-6,ty(0)+14)}
  ctx.font='bold 13px "Segoe UI",system-ui,sans-serif';ctx.textAlign='center';
  ctx.fillText('x',w-pad.right+10,ty(0)+16);ctx.fillText('y',tx(0),pad.top-12);

  ctx.strokeStyle='#00d4ff';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
  var drawing=false;
  for(var k=0;k<pts.length;k++){
    if(pts[k]===null){drawing=false;continue}
    var px=tx(pts[k].x),py=ty(pts[k].y);
    if(!drawing){ctx.beginPath();ctx.moveTo(px,py);drawing=true}else ctx.lineTo(px,py);
  }
  ctx.stroke();

  try{var f2=evaluate(fnExpr,2);if(typeof f2==='number'&&isFinite(f2)&&f2>yMin&&f2<yMax){
    ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(tx(2),ty(f2),5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=getTheme()==='dark'?'#cdd6f4':'#0f172a';ctx.font='bold 12px "Segoe UI",system-ui,sans-serif';ctx.textAlign='left';
    ctx.fillText('f(2)='+f2.toFixed(4),tx(2)+8,ty(f2)+4);
  }}catch(_){}
}

function drawPolar(fnExpr,canvasId){
  var canvas=document.getElementById(canvasId||'plotCanvasPolar');
  if(!canvas)return;
  var ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1;
  var rect=canvas.parentElement.getBoundingClientRect();
  var w=Math.min(rect.width-4,1060),h=Math.round(w*0.52);
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);

  var pad={top:30,right:30,bottom:40,left:56};
  var pw=w-pad.left-pad.right,ph=h-pad.top-pad.bottom;
  var maxR=5;
  var N=Math.min(1200,Math.round(pw*2));
  var pts=[];
  for(var i=0;i<=N;i++){
    var theta=-Math.PI*2+(4*Math.PI*i/N);
    var r;try{r=evaluate(fnExpr,theta)}catch(_){continue}
    if(typeof r!=='number'||!isFinite(r)||Math.abs(r)>50){if(pts.length)pts.push(null);continue}
    if(pts.length>0&&Math.abs(r-evaluate(fnExpr,theta-8*Math.PI/N))>20)pts.push(null);
    var xv=r*Math.cos(theta),yv=r*Math.sin(theta);
    if(Math.abs(xv)>maxR||Math.abs(yv)>maxR){if(pts.length)pts.push(null);continue}
    pts.push({x:xv,y:yv});
  }

  function tx(x){return pad.left+(x+maxR)/(2*maxR)*pw}
  function ty(y){return pad.top+(maxR-y)/(2*maxR)*ph}

  ctx.fillStyle=getTheme()==='dark'?'#181825':'#fcfdfd';ctx.fillRect(0,0,w,h);

  ctx.strokeStyle=getTheme()==='dark'?'#313244':'#e2e8f0';ctx.lineWidth=.5;
  for(var g=-maxR;g<=maxR;g+=1){ctx.beginPath();ctx.moveTo(tx(g),pad.top);ctx.lineTo(tx(g),h-pad.bottom);ctx.stroke();ctx.beginPath();ctx.moveTo(pad.left,ty(g));ctx.lineTo(w-pad.right,ty(g));ctx.stroke()}

  var axisColor=getTheme()==='dark'?'#cdd6f4':'#1e293b';
  ctx.strokeStyle=axisColor;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pad.left,ty(0));ctx.lineTo(w-pad.right,ty(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(tx(0),pad.top);ctx.lineTo(tx(0),h-pad.bottom);ctx.stroke();

  ctx.strokeStyle='#00d4ff';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
  var drawing=false;
  for(var k=0;k<pts.length;k++){
    if(pts[k]===null){drawing=false;continue}
    var px=tx(pts[k].x),py=ty(pts[k].y);
    if(!drawing){ctx.beginPath();ctx.moveTo(px,py);drawing=true}else ctx.lineTo(px,py);
  }
  ctx.stroke();
}

function onCalcBtn(text){
  var calcExprEl=document.getElementById('calcExpr'),calcResultEl=document.getElementById('calcResult');
  if(!calcExprEl||!calcResultEl)return;

  if(text==='C'){calcExpr='';calcCurrent='0';calcDisplayExpr='';updateCalcLCD();return}
  if(text==='⌫'){backspaceCalc();return}
  if(text==='='){evaluateCalc();return}
  if(text==='±'){toggleSign();return}
  var opMap={'×':'*','÷':'/','−':'-','x²':'^2','1/x':'^(-1)'};
  if(opMap.hasOwnProperty(text)){calcExpr+=opMap[text];calcCurrent='';calcDisplayExpr+=text;updateCalcLCD();return}
  var funcMap={'√':'sqrt(','n!':'factorial(','xⁿ':'^(','π':'pi','e':'e','log':'log10(','ln':'log('};
  if(funcMap.hasOwnProperty(text)){calcExpr+=funcMap[text];calcCurrent='';calcDisplayExpr+=text;updateCalcLCD();return}
  calcExpr+=text;calcDisplayExpr+=text;
  if(calcCurrent==='0'||calcCurrent==='')calcCurrent=text;else calcCurrent+=text;
  updateCalcLCD();
}

function backspaceCalc(){
  if(!calcExpr)return;
  var mt=['factorial(','^(-1)','^2','^(','sqrt(','log10(','log(','pi','e'];
  var found=false;
  for(var i=0;i<mt.length;i++){if(calcExpr.endsWith(mt[i])){calcExpr=calcExpr.slice(0,-mt[i].length);calcDisplayExpr=calcDisplayExpr.slice(0,-mt[i].length);found=true;break}}
  if(!found){calcExpr=calcExpr.slice(0,-1);calcDisplayExpr=calcDisplayExpr.slice(0,-1)}
  if(calcCurrent.length>1)calcCurrent=calcCurrent.slice(0,-1);else calcCurrent='0';
  updateCalcLCD();
}

function toggleSign(){
  if(!calcExpr)return;if(calcExpr.startsWith('-')){calcExpr=calcExpr.slice(1);calcDisplayExpr=calcDisplayExpr.slice(1)}
  else{calcExpr='-'+calcExpr;calcDisplayExpr='-'+calcDisplayExpr}

}

function evaluateCalc(){
  var calcExprEl=document.getElementById('calcExpr'),calcResultEl=document.getElementById('calcResult');

  try{
    var e=calcExpr,openP=e.split('(').length-e.split(')').length;
    for(var i=0;i<openP;i++)e+=')';
    var val=evaluate(e);
    if(typeof val==='number')val=fmtResult(val);
    calcExprEl.textContent=calcDisplayExpr+' =';calcResultEl.textContent=String(val);calcCurrent=String(val);
  }catch(ex){calcResultEl.textContent='错误';calcCurrent='0'}

  var calcExprEl=document.getElementById('calcExpr'),calcResultEl=document.getElementById('calcResult');
  if(calcExprEl)calcExprEl.textContent=calcDisplayExpr;

/* ── Poly & Algebra engine ── */
function Poly(terms){this.terms=terms||{}}
Poly.fromStr=function(s){
  s=s.replace(/\s/g,'');var terms={};
  var regex=/([+-]?\d*\.?\d*)\*?x\^(\d+)|([+-]?\d*\.?\d*)\*?x(?!\^)|([+-]?\d+\.?\d*)(?!\*?x)/gi;
  var match;
  while((match=regex.exec(s))!==null){
    if(match[1]!==undefined){var c=+match[1],d=+match[2];terms[d]=(terms[d]||0)+c}
    else if(match[3]!==undefined){var c2=+match[3];terms[1]=(terms[1]||0)+c2}
    else if(match[4]!==undefined){var c3=+match[4];if(!isNaN(c3))terms[0]=(terms[0]||0)+c3}
  }
  if(Object.keys(terms).length===0){
    s=s.replace(/--/g,'+').replace(/\+\+/g,'+');
    var parts=s.split(/(?=[+-])/g);
    for(var i=0;i<parts.length;i++){
      var p=parts[i];if(!p)continue;
      var sign=p[0]==='-'?-1:1;if(p[0]==='+'||p[0]==='-')p=p.slice(1);if(!p)continue;
      var xm=p.match(/^([\d.]*)\*?x(?:\^(\d+))?$/);
      if(xm){var cc=+xm[1]||1;var dd=+xm[2]||1;terms[dd]=(terms[dd]||0)+sign*cc}
      else{xm=p.match(/^([\d.]+)$/);if(xm)terms[0]=(terms[0]||0)+sign*(+xm[1])}
    }
  }
  return new Poly(terms);
};
Poly.prototype.toString=function(){
  var keys=Object.keys(this.terms).map(Number).sort(function(a,b){return b-a});
  var parts=[];for(var i=0;i<keys.length;i++){var d=keys[i],c=this.terms[d];if(c===0)continue;
    var sign=c>=0?(parts.length?'+ ':'') :'- ';var absC=Math.abs(c);
    var cs=absC===1&&d>0?'':(Number.isInteger(absC)?absC:absC.toFixed(4));
    if(d===0)parts.push(sign+absC);else if(d===1)parts.push(sign+cs+'x');else parts.push(sign+cs+'x^'+d);}
  return parts.join(' ')||'0';
};

var DERIV_RULES={
  'sin':'cos(x)','cos':'-sin(x)','tan':'sec(x)^2',
  'csc':'-csc(x)*cot(x)','sec':'sec(x)*tan(x)','cot':'-csc(x)^2',
  'sinh':'cosh(x)','cosh':'sinh(x)','tanh':'sech(x)^2',
  'exp(x)':'e^x','ln(x)':'1/x','log(x)':'1/(x*ln(10))','log10(x)':'1/(x*ln(10))',
  'sqrt(x)':'1/(2*sqrt(x))','asin(x)':'1/sqrt(1-x^2)','acos(x)':'-1/sqrt(1-x^2)','atan(x)':'1/(1+x^2)',
};
var INTEGRAL_RULES={
  'sin':'-cos(x)','cos':'sin(x)','tan':'-ln|cos(x)|',
  'sec^2':'tan(x)','csc^2':'-cot(x)','sec*tan':'sec(x)','csc*cot':'-csc(x)',
  'sinh':'cosh(x)','cosh':'sinh(x)',
  'e^x':'e^x','1/x':'ln|x|','1/(1+x^2)':'atan(x)','1/sqrt(1-x^2)':'asin(x)',
};

function numericDerivative(expr,at){var h=1e-7;try{return (evaluate(expr,at+h)-evaluate(expr,at-h))/(2*h)}catch(_){return NaN}}
function numericIntegral(expr,a,b){var N=500,h=(b-a)/N;try{var sum=evaluate(expr,a)+evaluate(expr,b);for(var k=1;k<N;k++)sum+=(k%2===0?2:4)*evaluate(expr,a+k*h);return sum*h/3}catch(_){return NaN}}
function solveQuadratic(a,b,c){var disc=b*b-4*a*c;if(disc<0)return 'No real roots (Δ='+disc.toFixed(4)+'<0)';var s=Math.sqrt(disc);return 'x₁='+((-b+s)/(2*a)).toFixed(6)+', x₂='+((-b-s)/(2*a)).toFixed(6)}
function factorQuadratic(a,b,c){
  function gcd(m,n){return n?gcd(n,m%n):Math.abs(m)}
  for(var p=1;p<=Math.abs(a);p++){if(a%p!==0)continue;var r=a/p;
    for(var q=-Math.abs(c);q<=Math.abs(c);q++){if(q===0||c%q!==0)continue;var s=c/q;if(p*s+r*q===b){
      var fp=p>0?(p===1?'':p):(p===-1?'-':p),fr=r>0?(r===1?'':r):(r===-1?'-':r);
      var sq=q>0?'+'+q:String(q),ss=s>0?'+'+s:String(s);
      return '('+fp+'x'+sq+')('+fr+'x'+ss+')';}}}
  return null;
}

function doAlgebra(expr,mode){
  try{switch(mode){
    case '解方程/组':{if(expr.indexOf(',')>0){var eqs=expr.split(',').map(function(e){return e.trim()});return {result:'System requires backend: '+eqs.join(' , '),steps:['Frontend only supports single equations']}}
      var hasX2=/\bx\^2\b/.test(expr)||/\bx\*\*2/.test(expr);
      if(hasX2||(expr.indexOf('=')>=0)){
        var parts=expr.split('=');var left=parts[0],right=parts[1]||'0';
        try{var p=Poly.fromStr(left+'-('+right+')');var aa=p.terms[2]||0,bb=p.terms[1]||0,cc=p.terms[0]||0;
          if(aa!==0&&(bb!==0||cc!==0)){var dr=solveQuadratic(aa,bb,cc);return {result:dr,steps:['Eq: '+expr,'Move: '+p.toString()+' = 0','Quadratic formula']};}}
        catch(_){}
      }return {result:'Use = sign: e.g. x^2-5*x+6=0',steps:[]};}
    case '因式分解':{try{var pp=Poly.fromStr(expr);var a2=pp.terms[2]||0,b2=pp.terms[1]||0,c2=pp.terms[0]||0;
      if(a2!==0){var fac=factorQuadratic(a2,b2,c2);if(fac)return {result:fac,steps:['Expr: '+expr,'Factor: '+fac]};return {result:'Cannot factor with integer coefficients',steps:['Expr: '+expr]};}
      return {result:'Only quadratic trinomials supported',steps:['Expr: '+expr]};}catch(e){return {result:'Error: '+e.message,steps:[]};}}
    case '展开':{try{var pp3=Poly.fromStr(expr);return {result:pp3.toString(),steps:['Expr: '+expr,'Expand: '+pp3.toString()]};}catch(e){return {result:'Error: '+e.message,steps:[]};}}
    case '表达式化简':{try{var pp5=Poly.fromStr(expr);return {result:pp5.toString(),steps:['Expr: '+expr,'Simplify (combine like terms): '+pp5.toString()]};}catch(e){return {result:'Error: '+e.message,steps:[]};}}
    case '求导':{
      var fn=expr.trim();
      for(var key in DERIV_RULES){if(fn===key||fn==='d/dx '+key){return {result:DERIV_RULES[key],steps:['f(x) = '+fn,"f'(x) = "+DERIV_RULES[key]]};}}
      try{var ppd=Poly.fromStr(fn);var dTerms={};var keys=Object.keys(ppd.terms).map(Number);
        for(var i=0;i<keys.length;i++){var d=keys[i],c=ppd.terms[d];if(d>0)dTerms[d-1]=c*d}
        var dp=new Poly(dTerms);return {result:dp.toString()||'0',steps:['f(x) = '+fn,"f'(x) = "+dp.toString()]};}
      catch(_){}
      var nd=numericDerivative(fn,2);
      if(!isNaN(nd))return {result:"f'(2) ≈ "+nd.toFixed(6),steps:['f(x) = '+fn,'Numerical derivative at x=2','≈ '+nd.toFixed(6)]};
      return {result:'Cannot differentiate',steps:[]};
    }
    case '不定积分':{
      var fn2=expr.trim();
      for(var k2 in INTEGRAL_RULES){if(fn2===k2){return {result:INTEGRAL_RULES[k2]+' + C',steps:['f(x) = '+fn2,'∫ = '+INTEGRAL_RULES[k2]+' + C']};}}
      try{var ppi=Poly.fromStr(fn2);var iTerms={};var keys2=Object.keys(ppi.terms).map(Number);
        for(var j=0;j<keys2.length;j++){var dd2=keys2[j],cc2=ppi.terms[dd2];iTerms[dd2+1]=cc2/(dd2+1)}
        var ip=new Poly(iTerms);return {result:ip.toString()+' + C',steps:['f(x) = '+fn2,'∫ = '+ip.toString()+' + C']};}
      catch(_){}
      var ni=numericIntegral(fn2,0,2);
      if(!isNaN(ni))return {result:'∫₀² '+fn2+' dx ≈ '+ni.toFixed(6)+' + C',steps:['Numerical integration [0,2]','≈ '+ni.toFixed(6)]};
      return {result:'Cannot integrate',steps:[]};
    }
    case '定积分':{var parts3=expr.split(',').map(function(s){return s.trim()});var f3=parts3[0],a3=+parts3[1]||0,b3=+parts3[2]||1;var val=numericIntegral(f3,a3,b3);if(!isNaN(val))return {result:val.toFixed(6),steps:['∫['+a3+','+b3+'] '+f3+' dx','Simpson (n=500)','≈ '+val.toFixed(6)]};return {result:'Integration failed',steps:[]};}
    case '极限':{var parts4=expr.split(',').map(function(s){return s.trim()});var f4=parts4[0],x0=+(parts4[2]||'0');var eps=1e-8,left=evaluate(f4,x0-eps),right=evaluate(f4,x0+eps);if(Math.abs(left-right)<1e-4)return {result:left.toFixed(6),steps:['lim[x→'+x0+'] '+f4,'Left ≈ '+left.toFixed(8),'Right ≈ '+right.toFixed(8),'= '+left.toFixed(6)]};return {result:'Limit does not exist',steps:['Left ≈ '+left.toFixed(6),'Right ≈ '+right.toFixed(6)]};}
    case '判别式':{try{var pp8=Poly.fromStr(expr);var a8=pp8.terms[2]||0,b8=pp8.terms[1]||0,c8=pp8.terms[0]||0;var disc=b8*b8-4*a8*c8;var desc=disc>0?'Two distinct real roots':disc===0?'One double root':'No real roots';return {result:'Δ = '+disc.toFixed(4)+' ('+desc+')',steps:['a='+a8+', b='+b8+', c='+c8,'Δ=b²-4ac='+disc.toFixed(4),desc]};}catch(e){return {result:'Error: need ax²+bx+c form',steps:[]};}}
    case '韦达定理':{try{var pp9=Poly.fromStr(expr);var a9=pp9.terms[2]||0,b9=pp9.terms[1]||0,c9=pp9.terms[0]||0;var sum=-b9/a9,prod=c9/a9;return {result:'x₁+x₂='+sum.toFixed(4)+', x₁·x₂='+prod.toFixed(4),steps:['For '+a9+'x²+'+b9+'x+'+c9+'=0','Sum: -b/a = '+sum.toFixed(4),'Product: c/a = '+prod.toFixed(4)]};}catch(e){return {result:'Error: need ax²+bx+c form',steps:[]};}}
    case '数列通项':{var parts5=expr.split(',').map(function(s){return s.trim()});var formula=parts5[0],n5=+parts5[1]||10;var terms=[];for(var t=1;t<=Math.min(n5,20);t++)terms.push(evaluate(formula.replace(/n/g,'('+t+')')));return {result:'a₁…aₙ: '+terms.map(function(v){return fmtResult(v)}).join(', '),steps:['a_n = '+formula,'First '+n5+' terms']};}
    case '等差数列求和':{var parts6=expr.split(',').map(function(s){return s.trim()});var a6=+parts6[0]||1,d6=+parts6[1]||1,n6=+parts6[2]||10;var sum6=n6*(2*a6+(n6-1)*d6)/2;return {result:sum6.toFixed(6),steps:['a₁='+a6+', d='+d6+', n='+n6,'S_n = n(2a₁+(n-1)d)/2 = '+sum6.toFixed(6)]};}
    case '等比数列求和':{var parts7=expr.split(',').map(function(s){return s.trim()});var a7=+parts7[0]||1,q7=+parts7[1]||2,n7=+parts7[2]||10;var sum7=q7===1?a7*n7:a7*(1-Math.pow(q7,n7))/(1-q7);return {result:sum7.toFixed(6),steps:['a₁='+a7+', q='+q7+', n='+n7,'S_n = a₁(1-q^n)/(1-q) = '+sum7.toFixed(6)]};}
    case '复数运算':{var ce=expr.replace(/[ij]/g,'i');try{var cv=parseComplex(ce);return {result:'('+cv.real.toFixed(4)+') + ('+cv.imag.toFixed(4)+')i',steps:['Complex: '+expr,'Real: '+cv.real.toFixed(4),'Imag: '+cv.imag.toFixed(4)]};}catch(e){return {result:'Parse failed',steps:[]};}}
    case '排列数':{var parts8=expr.split(',').map(function(s){return s.trim()});var n8=+parts8[0],m8=+parts8[1]||2;var r8=1;for(var i2=0;i2<m8;i2++)r8*=(n8-i2);return {result:'P('+n8+','+m8+') = '+r8,steps:['P('+n8+','+m8+')','= '+r8]};}
    case '组合数':{var parts9=expr.split(',').map(function(s){return s.trim()});var n9=+parts9[0],m9=+parts9[1]||2;var rn=1,rm=1;for(var i3=0;i3<m9;i3++){rn*=(n9-i3);rm*=(i3+1)}return {result:'C('+n9+','+m9+') = '+Math.round(rn/rm),steps:['C('+n9+','+m9+')','= '+Math.round(rn/rm)]};}
    case '解不等式/组':{return {result:'Inequality solving requires backend. Try: 2*x+1>5',steps:['Frontend limitation']};}
    default:return {result:'Select a calculation mode',steps:[]};
  }}catch(e){return {result:'Error: '+(e.message||e),steps:[]};}
}

function parseComplex(s){
  s=s.replace(/[ij]/g,'i');var real=0,imag=0;
  var m=s.match(/([+-]?\d*\.?\d*)\s*([+-])\s*(\d*\.?\d*)\s*\*?\s*i/);if(m){real=+m[1];imag=(m[2]==='-'?-1:1)*(+m[3]||1);return{real:real,imag:imag}}
  m=s.match(/([+-]?\d*\.?\d*)\s*i/);if(m){imag=+m[1]||1;return{real:0,imag:imag}}
  return{real:+s||0,imag:0};
}

function doAlgebraAndShow(expr,mode){
  var algInput=document.getElementById('algInput'),algMode=document.getElementById('algMode'),algResult=document.getElementById('algResult');
  if(!algResult)return;
  if(algInput)algInput.value=expr;if(algMode)algMode.value=mode;
  var res=doAlgebra(expr,mode);
  var html='';
  if(res.steps&&res.steps.length)html+='<div class="steps">'+res.steps.map(function(s){return s.replace(/</g,'&lt;')}).join('<br>')+'</div>';
  html+='<div class="answer">'+String(res.result).replace(/</g,'&lt;')+'</div>';
  algResult.innerHTML=html;
  if(containsX(expr))draw2D(expr,'plotCanvasAlg');
  var presets=document.getElementById('algPresets');if(presets){
    var btns=presets.querySelectorAll('button');
    for(var i=0;i<btns.length;i++)btns[i].classList.toggle('active',btns[i].dataset.expr===expr&&btns[i].dataset.mode===mode);
  }
}

function bindAlgebraEvents(){
  var algInput=document.getElementById('algInput'),algMode=document.getElementById('algMode'),algBtn=document.getElementById('algBtn'),algPresets=document.getElementById('algPresets');
  if(!algBtn)return;

  if(algPresets)algPresets.addEventListener('click',function(e){
    var btn=e.target.closest('button');if(!btn)return;
    if(btn.dataset.mode)doAlgebraAndShow(btn.dataset.expr,btn.dataset.mode);else if(btn.dataset.expr)draw2D(btn.dataset.expr,'plotCanvasAlg');
  });

/* ── 线性代数工作区 ── */
function renderLinearAlgebra(){
  workspace.innerHTML='<div class="workspace-header"><div class="ws-title">📊 线性代数</div><div class="ws-desc">矩阵运算：行列式、求逆、转置、矩阵乘法</div></div><div class="work-card"><h3>矩阵输入</h3><div style="margin:8px 0;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><label style="font-size:13px;color:var(--text-muted)">行：<select id="matRows"><option>2</option><option selected>3</option><option>4</option></select></label><label style="font-size:13px;color:var(--text-muted)">列：<select id="matCols"><option>2</option><option selected>3</option><option>4</option></select></label><button class="btn-calc-sm" id="matBuildBtn">创建矩阵</button><span style="margin-left:12px;font-size:13px;color:var(--text-muted)">操作：</span><select id="matOp"><option>行列式</option><option>求逆</option><option>转置</option></select><button class="btn-calc" id="matComputeBtn">计算</button></div><div id="matContainer"></div><div class="result-box" id="matResult"></div></div><div class="work-card"><h3>矩阵乘法</h3><div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start"><div><div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">矩阵 A</div><div id="matAContainer"></div></div><div style="font-size:24px;color:var(--text-muted);align-self:center">×</div><div><div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">矩阵 B</div><div id="matBContainer"></div></div><button class="btn-calc" id="matMulBtn" style="align-self:center">计算 A×B</button></div><div class="result-box" id="matMulResult" style="margin-top:12px"></div></div>';
  bindLinearAlgebraEvents();
}

function readMatrix(containerId){
  var c=document.getElementById(containerId);if(!c)return null;
  var inputs=c.querySelectorAll('input');var rows=[],row=[];var cols=0;
  for(var i=0;i<inputs.length;i++){
    row.push(+(inputs[i].value)||0);
    if(row.length===Math.sqrt(inputs.length)||(cols>0&&row.length===cols)){rows.push(row);if(!cols)cols=row.length;row=[]}
  }
  if(row.length)rows.push(row);
  return rows;
}

function buildMatrixInput(containerId,rows,cols){
  var c=document.getElementById(containerId);if(!c)return;
  c.innerHTML='<div class="matrix-grid" style="grid-template-columns:repeat('+cols+',64px)">';
  for(var r=0;r<rows;r++)for(var cl=0;cl<cols;cl++)c.innerHTML+='<input type="number" value="'+(r===cl?1:0)+'" step="any">';
  c.innerHTML+='</div>';
}

function bindLinearAlgebraEvents(){
  var buildBtn=document.getElementById('matBuildBtn');if(!buildBtn)return;
  buildBtn.addEventListener('click',function(){
    var rows=+(document.getElementById('matRows').value),cols=+(document.getElementById('matCols').value);
    buildMatrixInput('matContainer',rows,cols);buildMatrixInput('matAContainer',rows,cols);buildMatrixInput('matBContainer',cols,rows);
  });
  var computeBtn=document.getElementById('matComputeBtn');if(computeBtn)computeBtn.addEventListener('click',function(){
    var mat=readMatrix('matContainer');if(!mat)return;
    var op=document.getElementById('matOp').value,n=mat.length,m=mat[0].length;
    var resEl=document.getElementById('matResult');
    if(op==='转置'){var t=[];for(var j=0;j<m;j++){t[j]=[];for(var i=0;i<n;i++)t[j][i]=mat[i][j]}resEl.innerHTML='<div class="answer">'+JSON.stringify(t)+'</div>'}
    else if(op==='行列式'){if(n!==m){resEl.innerHTML='<span style="color:#ef4444">需要方阵</span>';return}
      function det(a){var nn=a.length;if(nn===1)return a[0][0];if(nn===2)return a[0][0]*a[1][1]-a[0][1]*a[1][0];var d=0;for(var jj=0;jj<nn;jj++){var sub=[];for(var ii=1;ii<nn;ii++){sub[ii-1]=[];for(var jj2=0;jj2<nn;jj2++){if(jj2===jj)continue;sub[ii-1].push(a[ii][jj2])}}d+=(jj%2?-1:1)*a[0][jj]*det(sub)}return d}
      resEl.innerHTML='<div class="answer">det = '+det(mat).toFixed(6)+'</div>';}
    else if(op==='求逆'){if(n!==m){resEl.innerHTML='<span style="color:#ef4444">需要方阵</span>';return}
      function inv(aa){var nn=aa.length;var aug=[];for(var ii2=0;ii2<nn;ii2++){aug[ii2]=aa[ii2].slice();for(var jj3=0;jj3<nn;jj3++)aug[ii2].push(ii2===jj3?1:0)}
        for(var ii3=0;ii3<nn;ii3++){var pv=aug[ii3][ii3];if(Math.abs(pv)<1e-10)return null;for(var jj4=0;jj4<2*nn;jj4++)aug[ii3][jj4]/=pv;
        for(var ii4=0;ii4<nn;ii4++){if(ii4===ii3)continue;var f=aug[ii4][ii3];for(var jj5=0;jj5<2*nn;jj5++)aug[ii4][jj5]-=f*aug[ii3][jj5]}}
        var invv=[];for(var ii5=0;ii5<nn;ii5++){invv[ii5]=aug[ii5].slice(nn)}return invv}
      var invm=inv(mat);resEl.innerHTML=invm?'<div class="answer">'+JSON.stringify(invm.map(function(r){return r.map(function(v){return +v.toFixed(4)})}))+'</div>':'<span style="color:#ef4444">矩阵不可逆</span>';}
  });
  var mulBtn=document.getElementById('matMulBtn');if(mulBtn)mulBtn.addEventListener('click',function(){
    var A=readMatrix('matAContainer'),B=readMatrix('matBContainer');var resEl=document.getElementById('matMulResult');
    if(!A||!B||A[0].length!==B.length){resEl.innerHTML='<span style="color:#ef4444">维度不匹配</span>';return}
    var C=[];for(var ii=0;ii<A.length;ii++){C[ii]=[];for(var jj=0;jj<B[0].length;jj++){C[ii][jj]=0;for(var kk=0;kk<B.length;kk++)C[ii][jj]+=A[ii][kk]*B[kk][jj]}}
    resEl.innerHTML='<div class="answer">'+JSON.stringify(C.map(function(r){return r.map(function(v){return +v.toFixed(4)})}))+'</div>';
  });
  buildBtn.click();
}

/* ── 2D 函数绘图工作区 ── */
function renderPlot2D(){
  workspace.innerHTML='<div class="workspace-header"><div class="ws-title">📈 2D 函数绘图</div><div class="ws-desc">绘制显函数 y=f(x) 曲线，支持间断点检测</div></div><div class="work-card"><div class="calc-row" style="margin-bottom:12px"><input id="plot2DInput" type="text" placeholder="输入函数表达式：sin(x)、x^2、tan(x)"><select id="plot2DXMin"><option value="-10">x∈[-10,10]</option><option value="-5" selected>x∈[-5,5]</option><option value="-3">x∈[-3,3]</option><option value="-2">x∈[-2,2]</option></select><button class="btn-calc" id="plot2DBtn">绘图</button></div><div class="presets"><button data-fn="sin(x)">sin(x)</button><button data-fn="tan(x)">tan(x)</button><button data-fn="x^2">x²</button><button data-fn="x^3-3*x">x³−3x</button><button data-fn="exp(-x^2)*cos(5*x)">e^(−x²)·cos(5x)</button><button data-fn="sin(x)/x">sinc(x)</button></div></div><div class="plot-card"><div class="header" id="plot2DTitle">f(x) = sin(x)</div><canvas id="plotCanvas2D"></canvas></div>';
  bindPlot2DEvents();
  setTimeout(function(){draw2D('sin(x)','plotCanvas2D')},100);
}

function bindPlot2DEvents(){
  var input=document.getElementById('plot2DInput'),btn=document.getElementById('plot2DBtn');
  if(btn)btn.addEventListener('click',function(){
    var expr=(input?input.value:'').trim()||'sin(x)';
    draw2D(expr,'plotCanvas2D');
    var title=document.getElementById('plot2DTitle');if(title)title.textContent='f(x) = '+expr;
  });
  if(input)input.addEventListener('keydown',function(e){if(e.key==='Enter')btn.click()});
  var presets=document.querySelector('#workspace .presets');if(presets)presets.addEventListener('click',function(e){var b=e.target.closest('button');if(b&&b.dataset.fn){if(input)input.value=b.dataset.fn;btn.click()}});
}

/* ── 极坐标绘图工作区 ── */
function renderPlotPolar(){
  workspace.innerHTML='<div class="workspace-header"><div class="ws-title">🔄 极坐标绘图</div><div class="ws-desc">绘制极坐标曲线 r=f(θ)，参数 0≤θ≤2π</div></div><div class="work-card"><div class="calc-row" style="margin-bottom:12px"><input id="plotPolarInput" type="text" placeholder="极坐标函数：sin(3*x)、1+cos(x)"><button class="btn-calc" id="plotPolarBtn">绘图</button></div><div class="presets"><button data-fn="sin(3*x)">三叶玫瑰线</button><button data-fn="1+cos(x)">心形线</button><button data-fn="x">阿基米德螺线</button><button data-fn="2*cos(2*x)">四叶玫瑰线</button><button data-fn="sin(x)/x">特殊曲线</button></div></div><div class="plot-card"><div class="header">r(θ) = sin(3θ)</div><canvas id="plotCanvasPolar"></canvas></div>';
  bindPlotPolarEvents();
  setTimeout(function(){drawPolar('sin(3*x)','plotCanvasPolar')},100);
}

function bindPlotPolarEvents(){
  var input=document.getElementById('plotPolarInput'),btn=document.getElementById('plotPolarBtn');
  if(btn)btn.addEventListener('click',function(){
    var expr=(input?input.value:'').trim()||'sin(3*x)';
    drawPolar(expr,'plotCanvasPolar');
  });
  if(input)input.addEventListener('keydown',function(e){if(e.key==='Enter')btn.click()});
  var presets=document.querySelector('#workspace .presets');if(presets)presets.addEventListener('click',function(e){var b=e.target.closest('button');if(b&&b.dataset.fn){if(input)input.value=b.dataset.fn;btn.click()}});
}

var KB_DATA={
  basic:['7','8','9','/','sqrt(','(',')','4','5','6','*','^','[',']','1','2','3','+','abs(','{','}','0','.','±','-','exp(','=','C','⌫','π','e','log(','ln(','!','%','x'],
  calculus:['∫','∬','∭','∂','∇','lim','∞','Σ','Π','sin(','cos(','tan(','csc(','sec(','cot(','asin(','acos(','atan(','sinh(','cosh(','tanh(','dx','dy','dt','dθ','→','·'],
  greek:['α','β','γ','δ','ε','ζ','η','θ','ι','κ','λ','μ','ν','ξ','π','ρ','σ','τ','υ','φ','χ','ψ','ω','Γ','Δ','Θ','Λ','Ξ','Π','Σ','Φ','Ψ','Ω'],
  linalg:['det(','tr(','rank(','inv(','T','·','×','⊗','⊕','⟨','⟩','∥','⊥','I_n','0_{m×n}','e_i','δ_{ij}','ε_{ijk}','[',';',']','A','B','C','x','y','v','w','λ'],
};
var currentKb='basic';

function buildKeyboard(){
  var content=document.getElementById('kbContent');if(!content)return;
  content.innerHTML='';
  var keys=KB_DATA[currentKb]||[];
  for(var i=0;i<keys.length;i++){
    var btn=document.createElement('button');btn.textContent=keys[i];
    btn.addEventListener('click',(function(k){return function(){insertSymbol(k)}})(keys[i]));
    content.appendChild(btn);
  }
}

function insertSymbol(sym){
  var activeEl=document.activeElement;
  if(activeEl&&(activeEl.tagName==='INPUT'||activeEl.tagName==='TEXTAREA')){
    var start=activeEl.selectionStart||0,end=activeEl.selectionEnd||0;
    var val=activeEl.value;activeEl.value=val.slice(0,start)+sym+val.slice(end);
    activeEl.selectionStart=activeEl.selectionEnd=start+sym.length;activeEl.focus();
  }
}

document.getElementById('kbTabs').addEventListener('click',function(e){
  var btn=e.target.closest('button');if(!btn)return;
  currentKb=btn.dataset.kb;
  document.querySelectorAll('#kbTabs button').forEach(function(b){b.classList.toggle('active',b===btn)});
  buildKeyboard();
});

/* 键盘面板切换 */
var kbPanel=document.getElementById('keyboard-panel'),kbVisible=false;
document.getElementById('btnKeyboard').addEventListener('click',function(){
  kbVisible=!kbVisible;kbPanel.style.display=kbVisible?'block':'none';
  document.getElementById('btnKeyboard').textContent=kbVisible?'🔽 收起':'⌨️ 键盘';
  if(kbVisible)buildKeyboard();
  status(kbVisible?'数学键盘已展开':'数学键盘已收起');
});

/* 全局键盘快捷键 */
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return; /* 输入框中不拦截 */
  if(currentTab==='calc'&&currentSub===0){
    var k=e.key;
    if(/^[0-9.]$/.test(k)){onCalcBtn(k);return}
    if(k==='+'){onCalcBtn('+');return}if(k==='-'){onCalcBtn('−');return}if(k==='*'){onCalcBtn('×');return}
    if(k==='/'){e.preventDefault();onCalcBtn('÷');return}if(k==='^'){onCalcBtn('xⁿ');return}
    if(k==='('){onCalcBtn('(');return}if(k===')'){onCalcBtn(')');return}
    if(k==='Enter'){e.preventDefault();onCalcBtn('=');return}
    if(k==='Backspace'){onCalcBtn('⌫');return}if(k==='Escape'){onCalcBtn('C');return}
  }
});

/* 窗口缩放重绘 */

window.addEventListener('resize',function(){clearTimeout(resizeTimer);resizeTimer=setTimeout(function(){

    if(currentSub===0)draw2D((document.getElementById('plot2DInput')?document.getElementById('plot2DInput').value.trim():'')||'sin(x)','plotCanvas2D');
    else if(currentSub===1)drawPolar((document.getElementById('plotPolarInput')?document.getElementById('plotPolarInput').value.trim():'')||'sin(3*x)','plotCanvasPolar');
    else{var canvas=document.querySelector('#workspace canvas');if(canvas)draw2D('x^2',canvas.id)}
  }
},200)});
