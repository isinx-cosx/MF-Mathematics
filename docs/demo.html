<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MF-Mathematics · 在线演示</title>
<style>
/* ═══════════════════════════════════════════════════════
   CSS 变量 — 双主题（匹配 QSS light.qss / dark.qss）
   ═══════════════════════════════════════════════════════ */
[data-theme="light"] {
  --bg:#f8fafc;--surface:#fff;--surface2:#f9fafb;--border:#e2e8f0;--border-in:#d1d5db;
  --text:#1e293b;--text-title:#0f172a;--text-muted:#475569;--text-subtle:#94a3b8;
  --primary:#3b82f6;--primary-hv:#2563eb;--accent:#00d4ff;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.06);
  --btn-num-bg:#fff;--btn-num-text:#1e293b;
  --btn-op-bg:#eff6ff;--btn-op-text:#2563eb;--btn-op-border:#bfdbfe;
  --btn-eq-bg:#2563eb;--btn-eq-text:#fff;--btn-eq-border:#1d4ed8;
  --btn-func-bg:#f8fafc;--btn-func-text:#475569;
  --btn-ctrl-bg:#fef2f2;--btn-ctrl-text:#dc2626;--btn-ctrl-border:#fecaca;
  --btn-paren-bg:#f8fafc;--btn-paren-text:#6366f1;
  --btn-const-bg:#f0fdf4;--btn-const-text:#16a34a;--btn-const-border:#bbf7d0;
  --toolbar-bg:#fff;--toolbar-border:#e2e8f0;
  --topbar-bg:#fff;--topbar-border:#e2e8f0;
  --statusbar-bg:#fff;--lcd-bg:#f8fafc;--lcd-border:#cbd5e1;
  --input-bg:#fafafa;--result-bg:#f0f9ff;--result-border:#bfdbfe;
  --combo-bg:#fff;--combo-hover:#f1f5f9;
  --plot-bg:#fcfdfd;--kb-bg:#fff;--kb-btn-bg:#fafafa;
  --sep-color:#cbd5e1;--add-btn-bg:transparent;--add-btn-hover:#e2e8f0;--add-btn-text:#94a3b8;
  --del-hover-bg:#fee2e2;--del-hover-text:#ef4444;
}
[data-theme="dark"] {
  --bg:#1e1e2e;--surface:#252540;--surface2:#1e1e2e;--border:#313244;--border-in:#45475a;
  --text:#cdd6f4;--text-title:#cdd6f4;--text-muted:#a6adc8;--text-subtle:#6c7086;
  --primary:#3b82f6;--primary-hv:#2563eb;--accent:#89b4fa;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.3);
  --btn-num-bg:#313244;--btn-num-text:#cdd6f4;
  --btn-op-bg:#1e1e2e;--btn-op-text:#89b4fa;--btn-op-border:#313244;
  --btn-eq-bg:#89b4fa;--btn-eq-text:#1e1e2e;--btn-eq-border:#74c7ec;
  --btn-func-bg:#313244;--btn-func-text:#a6adc8;
  --btn-ctrl-bg:#2a1616;--btn-ctrl-text:#f38ba8;--btn-ctrl-border:#542121;
  --btn-paren-bg:#313244;--btn-paren-text:#b4befe;
  --btn-const-bg:#1a2a1a;--btn-const-text:#a6e3a1;--btn-const-border:#2a4a2a;
  --toolbar-bg:#252540;--toolbar-border:#313244;
  --topbar-bg:#181825;--topbar-border:#313244;
  --statusbar-bg:#252540;--lcd-bg:#11111b;--lcd-border:#45475a;
  --input-bg:#1e1e2e;--result-bg:#1e2a3a;--result-border:#313244;
  --combo-bg:#1e1e2e;--combo-hover:#313244;
  --plot-bg:#181825;--kb-bg:#252540;--kb-btn-bg:#313244;
  --sep-color:#45475a;--add-btn-bg:transparent;--add-btn-hover:#313244;--add-btn-text:#6c7086;
  --del-hover-bg:#442222;--del-hover-text:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
}
#app-shell{max-width:1100px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* ── Topbar ── */
#topbar{
  background:var(--topbar-bg);border-bottom:1px solid var(--topbar-border);
  padding:0 20px;height:44px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
#topbar .brand{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
#topbar .brand .logo{width:28px;height:28px;background:var(--primary);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px}
#topbar .actions{display:flex;align-items:center;gap:8px}
#topbar .actions button,#topbar .actions a{
  font-size:12px;padding:5px 12px;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--text-muted);cursor:pointer;text-decoration:none;
  font-family:inherit;transition:all .15s;
}
#topbar .actions button:hover,#topbar .actions a:hover{background:var(--combo-hover);color:var(--text)}

/* ── 工具栏（匹配 QToolBar）── */
#toolbar{
  background:var(--toolbar-bg);border-bottom:1px solid var(--toolbar-border);
  padding:4px 16px;height:48px;display:flex;align-items:center;gap:10px;flex-shrink:0;overflow-x:auto;
}
#toolbar .mode-tabs{display:flex;gap:2px}
#toolbar .mode-tabs button{
  padding:8px 18px;font-size:13px;font-weight:600;border:1px solid transparent;
  border-radius:6px;background:transparent;color:var(--text-muted);cursor:pointer;
  font-family:inherit;transition:all .15s;
}
#toolbar .mode-tabs button:hover{background:var(--combo-hover)}
#toolbar .mode-tabs button.active{border-color:var(--primary);color:var(--primary);font-weight:700}

/* ── 子模式下拉框（匹配 QComboBox 140px）── */
#subCombo{
  padding:6px 10px;font-size:13px;border:1px solid var(--border-in);border-radius:4px;
  background:var(--combo-bg);color:var(--text);outline:none;cursor:pointer;
  min-width:140px;font-family:inherit;
}
#subCombo:focus{border-color:var(--primary)}
#subCombo:hover{background:var(--combo-hover)}

#toolbar .sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
#toolbar .tool-btn{
  font-size:13px;padding:6px 14px;border:1px solid transparent;border-radius:6px;
  background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;
  white-space:nowrap;transition:all .15s;
}
#toolbar .tool-btn:hover{background:var(--combo-hover);color:var(--text)}
#toolbar .spacer{flex:1}

/* ── 工作区 ── */
#workspace{flex:1;padding:20px 24px;overflow-y:auto}
.workspace-header{margin-bottom:16px}
.workspace-header .ws-title{font-size:20px;font-weight:600;color:var(--text-title)}
.workspace-header .ws-desc{font-size:14px;color:var(--text-muted);margin-top:4px}

/* work_card */
.work-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.work-card h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px}

/* ── LCD ── */
.lcd{background:var(--lcd-bg);border:2px solid var(--lcd-border);border-radius:10px;padding:12px 16px;margin-bottom:12px;min-height:88px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end}
.lcd .expr{color:var(--text-subtle);font-size:16px;min-height:22px;word-break:break-all;font-family:monospace}
.lcd .result{color:var(--text-title);font-size:40px;font-weight:700;min-height:48px;word-break:break-all}

/* ── 按钮网格 ── */
.btn-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.btn-grid button{padding:12px 4px;font-size:15px;font-weight:500;border-radius:6px;cursor:pointer;transition:all .12s;min-height:44px;font-family:inherit}
.btn-num{background:var(--btn-num-bg);color:var(--btn-num-text);border:1px solid var(--border)!important}
.btn-num:hover{filter:brightness(.95)}.btn-num:active{filter:brightness(.9)}
.btn-op{background:var(--btn-op-bg);color:var(--btn-op-text);border:1px solid var(--btn-op-border)!important;font-weight:600}
.btn-op:hover{filter:brightness(.95)}.btn-op:active{filter:brightness(.9)}
.btn-eq{background:var(--btn-eq-bg);color:var(--btn-eq-text);border:1px solid var(--btn-eq-border)!important;font-size:18px;font-weight:700}
.btn-eq:hover{filter:brightness(.9)}.btn-eq:active{filter:brightness(.85)}
.btn-func{background:var(--btn-func-bg);color:var(--btn-func-text);border:1px solid var(--border)!important;font-size:13px}
.btn-func:hover{filter:brightness(.95)}.btn-func:active{filter:brightness(.9)}
.btn-ctrl{background:var(--btn-ctrl-bg);color:var(--btn-ctrl-text);border:1px solid var(--btn-ctrl-border)!important;font-size:14px;font-weight:600}
.btn-ctrl:hover{filter:brightness(.95)}.btn-ctrl:active{filter:brightness(.9)}
.btn-paren{background:var(--btn-paren-bg);color:var(--btn-paren-text);border:1px solid var(--border)!important;font-size:14px;font-weight:600}
.btn-paren:hover{filter:brightness(.95)}.btn-paren:active{filter:brightness(.9)}
.btn-const{background:var(--btn-const-bg);color:var(--btn-const-text);border:1px solid var(--btn-const-border)!important;font-size:13px;font-weight:600}
.btn-const:hover{filter:brightness(.95)}.btn-const:active{filter:brightness(.9)}

/* ── CalcBlock 风格 ── */
.calc-block{border:1px solid var(--border);border-radius:8px;padding:10px 12px;background:var(--surface);margin-bottom:0}
.calc-block .cb-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.calc-block .cb-row input{flex:1 1 180px;padding:8px 12px;font-size:14px;font-family:'Cascadia Code','Fira Code','Consolas',monospace;border:1px solid var(--border-in);border-radius:4px;outline:none;background:var(--input-bg);color:var(--text);transition:border-color .15s}
.calc-block .cb-row input:focus{border-color:var(--primary);background:var(--surface)}
.calc-block .cb-row select{padding:8px 12px;font-size:13px;border:1px solid var(--border-in);border-radius:4px;background:var(--input-bg);color:var(--text);outline:none;cursor:pointer;min-width:120px;font-family:inherit}
.calc-block .cb-row select:focus{border-color:var(--primary)}
.cb-separator{height:1px;background:var(--sep-color);margin:6px 0}
.btn-calc-sm{padding:8px 12px;font-size:12px;font-weight:500;background:var(--add-btn-bg);color:var(--add-btn-text);border:1px solid var(--border);border-radius:4px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-calc-sm:hover{background:var(--add-btn-hover);color:var(--text)}
.btn-calc{border:none;border-radius:4px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
[data-theme="light"] .btn-calc{background:#e2e8f0;color:#0f172a}
[data-theme="light"] .btn-calc:hover{background:#cbd5e1}
[data-theme="dark"] .btn-calc{background:#45475a;color:#cdd6f4}
[data-theme="dark"] .btn-calc:hover{background:#585b70}
.btn-delete{background:transparent;border:none;color:var(--text-subtle);font-size:16px;font-weight:bold;padding:4px 8px;border-radius:4px;cursor:pointer;font-family:inherit;transition:all .12s;min-width:30px}
.btn-delete:hover{background:var(--del-hover-bg);color:var(--del-hover-text)}

.result-box{margin-top:10px;padding:14px 18px;background:var(--result-bg);border:1px solid var(--result-border);border-radius:10px;font-size:15px;color:var(--text);min-height:44px;line-height:1.6}
.result-box .steps{color:var(--text-muted);font-size:13px;margin-bottom:4px}
.result-box .answer{font-weight:700;color:var(--primary);font-size:18px;font-family:monospace}

.presets{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.presets button{padding:8px 16px;font-size:13px;font-weight:500;background:#eef2f6;color:var(--text-muted);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .15s;font-family:inherit}
.presets button:hover{background:#d0d9e6;color:var(--text)}
.presets button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
[data-theme="dark"] .presets button{background:#313244}
[data-theme="dark"] .presets button:hover{background:#45475a}

/* ── 添加按钮（匹配 btn_add / plot_btn_add）── */
.btn-add{
  display:block;width:100%;text-align:center;padding:14px;font-size:13px;
  background:var(--add-btn-bg);color:var(--add-btn-text);border:1px solid var(--border);
  border-bottom:none;cursor:pointer;font-family:inherit;transition:all .15s;border-radius:0 0 8px 8px;
}
.btn-add:hover{background:var(--add-btn-hover);color:var(--text)}

/* ── 绘图左右分栏 ── */
.plot-layout{display:flex;gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow)}
.plot-left{width:300px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--border);padding:14px;overflow-y:auto;max-height:520px}
.plot-left .plot-input-row{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.plot-left input{width:100%;padding:8px 12px;font-size:14px;font-family:'Cascadia Code','Fira Code','Consolas',monospace;border:1px solid var(--border-in);border-radius:4px;outline:none;background:var(--input-bg);color:var(--text)}
.plot-left input:focus{border-color:var(--primary)}
.plot-right{flex:1;min-height:380px;display:flex;align-items:center;justify-content:center}
.plot-right canvas{display:block}
.plot-fn-row{display:flex;gap:4px;align-items:center;margin-bottom:4px;padding:6px 8px;background:var(--surface);border:1px solid var(--border);border-radius:6px}
.plot-fn-row input{flex:1;padding:6px 8px;font-size:13px;font-family:monospace;border:1px solid var(--border-in);border-radius:4px;outline:none;background:var(--input-bg);color:var(--text)}
.plot-fn-row input:focus{border-color:var(--primary)}
.plot-fn-row .fn-color{width:20px;height:20px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid var(--border)}
.plot-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;font-size:12px;color:var(--text-muted)}

/* ── 占位卡片 ── */
.placeholder-card{background:var(--surface);border:2px dashed var(--border);border-radius:12px;padding:40px 24px;text-align:center;color:var(--text-subtle)}
.placeholder-card .ph-icon{font-size:48px;margin-bottom:12px}
.placeholder-card .ph-title{font-size:16px;font-weight:600;color:var(--text-muted);margin-bottom:6px}
.placeholder-card .ph-desc{font-size:13px;line-height:1.6}

/* ── 状态栏 ── */
#statusbar{
  background:var(--statusbar-bg);border-top:1px solid var(--border);
  padding:6px 16px;height:30px;display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:var(--text-subtle);flex-shrink:0;
}
#statusbar #brand-label{font-size:11px}

/* ── 键盘面板 ── */
#keyboard-panel{border-top:1px solid var(--border);background:var(--kb-bg);flex-shrink:0;display:none}
#keyboard-panel .kb-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 12px;overflow-x:auto}
#keyboard-panel .kb-tabs button{padding:6px 14px;font-size:12px;border:1px solid transparent;border-bottom:none;background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;border-radius:4px 4px 0 0;transition:all .12s}
#keyboard-panel .kb-tabs button.active{background:var(--surface);color:var(--text);border-color:var(--border);border-bottom:2px solid var(--primary)}
#keyboard-panel .kb-content{padding:8px 12px;display:flex;flex-wrap:wrap;gap:3px}
#keyboard-panel .kb-content button{padding:6px 10px;font-size:14px;font-family:monospace;background:var(--kb-btn-bg);color:var(--text);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .1s;min-width:38px}
#keyboard-panel .kb-content button:hover{background:var(--combo-hover);border-color:var(--border-in)}

/* ── 响应式 ── */
@media(max-width:700px){
  #workspace{padding:14px 10px}
  .btn-grid button{font-size:13px;padding:8px 2px;min-height:42px}
  .lcd .result{font-size:28px}
  #topbar .brand{font-size:14px}
  #toolbar{gap:4px;padding:4px 8px;height:auto;flex-wrap:wrap}
  #toolbar .mode-tabs button{padding:6px 12px;font-size:12px}
  #toolbar .tool-btn{font-size:12px;padding:5px 10px}
  #subCombo{min-width:110px;font-size:12px}
  .plot-layout{flex-direction:column}
  .plot-left{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:none}
  .plot-right{min-height:300px}
  .calc-block .cb-row{flex-direction:column;align-items:stretch}
  .calc-block .cb-row select{min-width:auto}
}
</style>
</head>
<body>
<div id="app-shell">
  <header id="topbar">
    <span class="brand"><span class="logo">M</span>MF-Mathematics</span>
    <span class="actions">
      <button id="themeToggle" title="切换主题">🌙 暗色</button>
      <a href="https://github.com/isinx-cosx/MF-Mathematics" target="_blank" rel="noopener">GitHub</a>
    </span>
  </header>

  <nav id="toolbar">
    <div class="mode-tabs" id="modeTabs">
      <button data-tab="calc" class="active">计算</button>
      <button data-tab="plot">绘图</button>
    </div>
    <span class="sep"></span>
    <select id="subCombo"></select>
    <span class="spacer"></span>
    <span class="sep"></span>
    <button class="tool-btn" id="btnKeyboard" title="数学键盘">⌨️ 键盘</button>
    <button class="tool-btn" id="btnAbout">ℹ️ 关于</button>
  </nav>

  <main id="workspace"></main>

  <div id="keyboard-panel">
    <div class="kb-tabs" id="kbTabs">
      <button class="active" data-kb="basic">基本</button>
      <button data-kb="calc">微积分</button>
      <button data-kb="greek">希腊字母</button>
      <button data-kb="linalg">线性代数</button>
    </div>
    <div class="kb-content" id="kbContent"></div>
  </div>

  <footer id="statusbar">
    <span id="statusMsg">就绪</span>
    <span id="brand-label">MF-Vis-Science · Open Studio</span>
  </footer>
</div>

<script>
(function(){'use strict';
/* ═══════════════════════════════════════════════════════════════
   §1 数学表达式解析器 — 递归下降（零 eval / new Function）
   ═══════════════════════════════════════════════════════════════ */
var TOK_NUM=1,TOK_ID=2,TOK_OP=3,TOK_LP=4,TOK_RP=5,TOK_COMMA=6;

function preprocess(s){
  return s.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-').replace(/x²/g,'x^2');
}

function tokenize(s){
  var tokens=[],i=0,n=s.length;
  while(i<n){
    var c=s[i];
    if(/\s/.test(c)){i++;continue}
    if(/[0-9.]/.test(c)){var num='';while(i<n&&/[0-9.]/.test(s[i]))num+=s[i++];tokens.push({type:TOK_NUM,value:+num});continue}
    if(/[a-zA-Z]/.test(c)){var id='';while(i<n&&/[a-zA-Z0-9_]/.test(s[i]))id+=s[i++];tokens.push({type:TOK_ID,value:id});continue}
    if(c==='('){tokens.push({type:TOK_LP});i++;continue}
    if(c===')'){tokens.push({type:TOK_RP});i++;continue}
    if(c===','){tokens.push({type:TOK_COMMA});i++;continue}
    if(c==='^'){tokens.push({type:TOK_OP,value:'^',prec:4,right:true});i++;continue}
    if(c==='%'){tokens.push({type:TOK_OP,value:'%',prec:3});i++;continue}
    if(c==='*'){tokens.push({type:TOK_OP,value:'*',prec:3});i++;continue}
    if(c==='/'){tokens.push({type:TOK_OP,value:'/',prec:3});i++;continue}
    if(c==='+'){tokens.push({type:TOK_OP,value:'+',prec:2});i++;continue}
    if(c==='-'){
      var prev=tokens.length?tokens[tokens.length-1]:null;
      if(!prev||prev.type===TOK_OP||prev.type===TOK_LP||prev.type===TOK_COMMA){tokens.push({type:TOK_NUM,value:0});tokens.push({type:TOK_OP,value:'u-',prec:5,right:true})}
      else tokens.push({type:TOK_OP,value:'-',prec:2});
      i++;continue;
    }
    i++;
  }
  var out=[];
  for(var j=0;j<tokens.length;j++){
    var a=tokens[j],b=tokens[j+1];out.push(a);if(!b)break;
    var can=(a.type===TOK_NUM||a.type===TOK_RP||a.type===TOK_ID)&&(b.type===TOK_NUM||b.type===TOK_LP||b.type===TOK_ID);
    if(can&&!(a.type===TOK_NUM&&b.type===TOK_NUM))out.push({type:TOK_OP,value:'*',prec:3});
  }
  return out;
}

var CONSTANTS={pi:Math.PI,PI:Math.PI,e:Math.E,E:Math.E};
var FUNCTIONS={
  sin:Math.sin,cos:Math.cos,tan:Math.tan,
  csc:function(x){return 1/Math.sin(x)},sec:function(x){return 1/Math.cos(x)},cot:function(x){return 1/Math.tan(x)},
  asin:Math.asin,acos:Math.acos,atan:Math.atan,
  acsc:function(x){return Math.asin(1/x)},asec:function(x){return Math.acos(1/x)},acot:function(x){return Math.PI/2-Math.atan(x)},
  sinh:Math.sinh,cosh:Math.cosh,tanh:Math.tanh,
  asinh:Math.asinh,acosh:Math.acosh,atanh:Math.atanh,
  sqrt:Math.sqrt,cbrt:Math.cbrt,abs:Math.abs,log:Math.log,log10:Math.log10,log2:Math.log2,exp:Math.exp,
  factorial:function(n){if(n<0||n!==Math.floor(n))return NaN;var r=1;for(var k=2;k<=n;k++)r*=k;return r},
  sign:Math.sign,floor:Math.floor,ceil:Math.ceil,round:Math.round,pow:Math.pow,
};

function parse(tokens){
  var pos=0;
  function cur(){return tokens[pos]}
  function eat(t){if(t!==undefined&&cur().type!==t)throw Error('Expected token type '+t);pos++}
  function primary(){
    var t=cur();if(!t)throw Error('Unexpected end');
    if(t.type===TOK_NUM){eat();return t.value}
    if(t.type===TOK_LP){eat();var v=expr();eat(TOK_RP);return v}
    if(t.type===TOK_ID){eat();var id=t.value;
      if(cur()&&cur().type===TOK_LP){eat();var args=[];if(cur().type!==TOK_RP){args.push(expr());while(cur().type===TOK_COMMA){eat();args.push(expr())}}eat(TOK_RP);
        var fn=FUNCTIONS[id];if(fn)return fn.apply(null,args);throw Error('Unknown function: '+id);}
      if(CONSTANTS.hasOwnProperty(id))return CONSTANTS[id];
      if(id==='x')return NaN;throw Error('Unknown identifier: '+id);}
    throw Error('Unexpected token type: '+t.type);
  }
  function unary(){if(cur()&&cur().type===TOK_OP&&cur().value==='u-'){eat();return -unary()}return primary()}
  function binary(minPrec){
    var left=unary();
    while(cur()&&cur().type===TOK_OP&&cur().value!=='u-'){
      var op=cur();if(op.prec===undefined)break;
      var p=op.prec-(op.right?1:0);if(p<minPrec)break;eat();
      var right=binary(op.prec+(op.right?0:1));
      switch(op.value){case'+':left+=right;break;case'-':left-=right;break;case'*':left*=right;break;case'/':left/=right;break;case'^':left=Math.pow(left,right);break;case'%':left%=right;break;}
    }
    return left;
  }
  function expr(){return binary(0)}
  return expr();
}

function evaluate(str,xVal){
  var s=preprocess(str);
  var tokens=tokenize(s),t2=[];
  for(var i=0;i<tokens.length;i++){
    var t=tokens[i];
    if(xVal!==undefined&&t.type===TOK_ID&&t.value==='x')t2.push({type:TOK_NUM,value:xVal});
    else if(xVal===undefined&&t.type===TOK_ID&&t.value==='x')t2.push({type:TOK_NUM,value:1});
    else t2.push(t);
  }
  return parse(t2);
}
function containsX(str){return /\bx\b/.test(preprocess(str))}
function fmtResult(v){
  if(typeof v!=='number'||!isFinite(v))return '错误';
  if(Math.abs(v)>=1e12||(Math.abs(v)<1e-10&&v!==0))return v.toExponential(6);
  var s=v.toFixed(12);s=s.replace(/\.?0+$/,'');if(s==='')s='0';if(s.length>14)s=v.toPrecision(12);
  return s;
}

var PLOT_COLORS=['#00d4ff','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16'];

function draw2D(fnExpr,canvasId,color){
  var canvas=document.getElementById(canvasId||'plotCanvas');
  if(!canvas)return;
  var ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1;
  var parent=canvas.parentElement,rect=parent.getBoundingClientRect();
  var w=rect.width-4,h=Math.max(380,Math.round(w*0.52));
  if(parent.classList.contains('plot-right')){w=rect.width-4;h=Math.max(380,rect.height-8)}
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);

  var pad={top:30,right:30,bottom:40,left:56};
  var pw=w-pad.left-pad.right,ph=h-pad.top-pad.bottom;
  var xMin=-5,xMax=5,N=Math.min(800,Math.round(pw*2));
  var pts=[],yMin=Infinity,yMax=-Infinity;
  for(var i=0;i<=N;i++){
    var xv=xMin+(xMax-xMin)*i/N,yv;
    try{yv=evaluate(fnExpr,xv)}catch(_){continue}
    if(typeof yv!=='number'||!isFinite(yv)||Math.abs(yv)>1000)continue;
    if(pts.length>0&&Math.abs(yv-pts[pts.length-1].y)>100)pts.push(null);
    pts.push({x:xv,y:yv});if(yv<yMin)yMin=yv;if(yv>yMax)yMax=yv;
  }
  if(!isFinite(yMin)){yMin=-5;yMax=5}
  var yr=yMax-yMin||2;yMin-=yr*.1;yMax+=yr*.1;
  function tx(x){return pad.left+(x-xMin)/(xMax-xMin)*pw}
  function ty(y){return pad.top+(yMax-y)/(yMax-yMin)*ph}

  var isDark=getTheme()==='dark';
  ctx.fillStyle=isDark?'#181825':'#fcfdfd';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle=isDark?'#313244':'#e2e8f0';ctx.lineWidth=.5;
  var xStep=xMax-xMin>10?2:1;
  for(var gx=Math.ceil(xMin);gx<=xMax;gx+=xStep){ctx.beginPath();ctx.moveTo(tx(gx),pad.top);ctx.lineTo(tx(gx),h-pad.bottom);ctx.stroke()}
  var yExt=yMax-yMin,yStep=yExt>20?5:yExt>10?2:yExt>4?1:.5;
  for(var gy=Math.ceil(yMin/yStep)*yStep;gy<=yMax;gy+=yStep){ctx.beginPath();ctx.moveTo(pad.left,ty(gy));ctx.lineTo(w-pad.right,ty(gy));ctx.stroke()}

  var axisColor=isDark?'#cdd6f4':'#1e293b';
  ctx.strokeStyle=axisColor;ctx.lineWidth=1.5;
  if(yMin<=0&&yMax>=0){ctx.beginPath();ctx.moveTo(pad.left,ty(0));ctx.lineTo(w-pad.right,ty(0));ctx.stroke()}
  if(xMin<=0&&xMax>=0){ctx.beginPath();ctx.moveTo(tx(0),pad.top);ctx.lineTo(tx(0),h-pad.bottom);ctx.stroke()}

  var tickColor=isDark?'#a6adc8':'#64748b';
  ctx.fillStyle=tickColor;ctx.font='11px "Segoe UI",system-ui,sans-serif';ctx.textAlign='center';
  for(var txv=Math.ceil(xMin);txv<=xMax;txv+=xStep)ctx.fillText(txv,tx(txv),h-pad.bottom+16);
  ctx.textAlign='right';
  for(var tyv=Math.ceil(yMin/yStep)*yStep;tyv<=yMax;tyv+=yStep){if(Math.abs(tyv)<.001)continue;ctx.fillText(Number(tyv.toFixed(2)),pad.left-6,ty(tyv)+4)}

  ctx.fillStyle=axisColor;
  ctx.beginPath();var ax=w-pad.right+10,ay=ty(0);ctx.moveTo(ax,ay);ctx.lineTo(ax-8,ay-4);ctx.lineTo(ax-8,ay+4);ctx.fill();
  ctx.beginPath();var bx=tx(0),by=pad.top-10;ctx.moveTo(bx,by);ctx.lineTo(bx-4,by+8);ctx.lineTo(bx+4,by+8);ctx.fill();
  ctx.textAlign='right';ctx.fillText('O',tx(0)-6,ty(0)+14);
  ctx.font='bold 13px "Segoe UI",system-ui,sans-serif';ctx.textAlign='center';
  ctx.fillText('x',w-pad.right+10,ty(0)+16);ctx.fillText('y',tx(0),pad.top-12);

  var curveColor=color||'#00d4ff';
  ctx.strokeStyle=curveColor;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
  var drawing=false;
  for(var k=0;k<pts.length;k++){
    if(pts[k]===null){drawing=false;continue}
    var px=tx(pts[k].x),py=ty(pts[k].y);
    if(!drawing){ctx.beginPath();ctx.moveTo(px,py);drawing=true}else ctx.lineTo(px,py);
  }
  ctx.stroke();
}

function onCalcBtn(text){
  var calcExprEl=document.getElementById('calcExpr'),calcResultEl=document.getElementById('calcResult');
  if(!calcExprEl||!calcResultEl)return;
  if(text==='C'){calcExpr='';calcCurrent='0';calcDisplayExpr='';updateCalcLCD();return}
  if(text==='⌫'){backspaceCalc();return}
  if(text==='='){evaluateCalc();return}
  if(text==='±'){toggleSign();return}
  var opMap={'×':'*','÷':'/','−':'-','x²':'^2','1/x':'^(-1)'};
  if(opMap.hasOwnProperty(text)){calcExpr+=opMap[text];calcCurrent='';calcDisplayExpr+=text;updateCalcLCD();return}
  var funcMap={'√':'sqrt(','n!':'factorial(','xⁿ':'^(','π':'pi','e':'e','log':'log10(','ln':'log('};
  if(funcMap.hasOwnProperty(text)){calcExpr+=funcMap[text];calcCurrent='';calcDisplayExpr+=text;updateCalcLCD();return}
  calcExpr+=text;calcDisplayExpr+=text;
  if(calcCurrent==='0'||calcCurrent==='')calcCurrent=text;else calcCurrent+=text;
  updateCalcLCD();
}

function backspaceCalc(){
  if(!calcExpr)return;
  var mt=['factorial(','^(-1)','^2','^(','sqrt(','log10(','log(','pi','e'];
  var found=false;
  for(var i=0;i<mt.length;i++){if(calcExpr.endsWith(mt[i])){calcExpr=calcExpr.slice(0,-mt[i].length);calcDisplayExpr=calcDisplayExpr.slice(0,-mt[i].length);found=true;break}}
  if(!found){calcExpr=calcExpr.slice(0,-1);calcDisplayExpr=calcDisplayExpr.slice(0,-1)}
  if(calcCurrent.length>1)calcCurrent=calcCurrent.slice(0,-1);else calcCurrent='0';
  updateCalcLCD();
}

function toggleSign(){
  if(!calcExpr)return;if(calcExpr.startsWith('-')){calcExpr=calcExpr.slice(1);calcDisplayExpr=calcDisplayExpr.slice(1)}
  else{calcExpr='-'+calcExpr;calcDisplayExpr='-'+calcDisplayExpr}
  calcCurrent=calcExpr.slice(-8)||'0';updateCalcLCD();
}

function evaluateCalc(){

  try{
    var e=calcExpr,openP=e.split('(').length-e.split(')').length;

    var val=evaluate(e);
    if(typeof val==='number')val=fmtResult(val);
    calcExprEl.textContent=calcDisplayExpr+' =';calcResultEl.textContent=String(val);calcCurrent=String(val);
  }catch(ex){calcResultEl.textContent='错误';calcCurrent='0'}
}

  if(calcExprEl)calcExprEl.textContent=calcDisplayExpr;

/* ── Poly & Algebra Engine ── */
function Poly(terms){this.terms=terms||{}}
Poly.fromStr=function(s){
  s=s.replace(/\s/g,'');var terms={};
  var regex=/([+-]?\d*\.?\d*)\*?x\^(\d+)|([+-]?\d*\.?\d*)\*?x(?!\^)|([+-]?\d+\.?\d*)(?!\*?x)/gi;var match;
  while((match=regex.exec(s))!==null){
    if(match[1]!==undefined){var c=+match[1],d=+match[2];terms[d]=(terms[d]||0)+c}
    else if(match[3]!==undefined){var c2=+match[3];terms[1]=(terms[1]||0)+c2}
    else if(match[4]!==undefined){var c3=+match[4];if(!isNaN(c3))terms[0]=(terms[0]||0)+c3}
  }
  if(Object.keys(terms).length===0){s=s.replace(/--/g,'+').replace(/\+\+/g,'+');var parts=s.split(/(?=[+-])/g);
    for(var i=0;i<parts.length;i++){var p=parts[i];if(!p)continue;var sign=p[0]==='-'?-1:1;if(p[0]==='+'||p[0]==='-')p=p.slice(1);if(!p)continue;
      var xm=p.match(/^([\d.]*)\*?x(?:\^(\d+))?$/);if(xm){var cc=+xm[1]||1;var dd=+xm[2]||1;terms[dd]=(terms[dd]||0)+sign*cc}
      else{xm=p.match(/^([\d.]+)$/);if(xm)terms[0]=(terms[0]||0)+sign*(+xm[1])}}}
  return new Poly(terms);
};
Poly.prototype.toString=function(){
  var keys=Object.keys(this.terms).map(Number).sort(function(a,b){return b-a});var parts=[];
  for(var i=0;i<keys.length;i++){var d=keys[i],c=this.terms[d];if(c===0)continue;var sign=c>=0?(parts.length?'+ ':'') :'- ';var absC=Math.abs(c);
    var cs=absC===1&&d>0?'':(Number.isInteger(absC)?absC:absC.toFixed(4));
    if(d===0)parts.push(sign+absC);else if(d===1)parts.push(sign+cs+'x');else parts.push(sign+cs+'x^'+d);}

var DERIV_RULES={'sin':'cos(x)','cos':'-sin(x)','tan':'sec(x)^2','csc':'-csc(x)*cot(x)','sec':'sec(x)*tan(x)','cot':'-csc(x)^2','sinh':'cosh(x)','cosh':'sinh(x)','tanh':'sech(x)^2','exp(x)':'e^x','ln(x)':'1/x','log(x)':'1/(x*ln(10))','log10(x)':'1/(x*ln(10))','sqrt(x)':'1/(2*sqrt(x))','asin(x)':'1/sqrt(1-x^2)','acos(x)':'-1/sqrt(1-x^2)','atan(x)':'1/(1+x^2)'};
var INTEGRAL_RULES={'sin':'-cos(x)','cos':'sin(x)','tan':'-ln|cos(x)|','sec^2':'tan(x)','csc^2':'-cot(x)','sec*tan':'sec(x)','csc*cot':'-csc(x)','sinh':'cosh(x)','cosh':'sinh(x)','e^x':'e^x','1/x':'ln|x|','1/(1+x^2)':'atan(x)','1/sqrt(1-x^2)':'asin(x)'};
function numericDerivative(expr,at){var h=1e-7;try{return (evaluate(expr,at+h)-evaluate(expr,at-h))/(2*h)}catch(_){return NaN}}
function numericIntegral(expr,a,b){var N=500,h=(b-a)/N;try{var sum=evaluate(expr,a)+evaluate(expr,b);for(var k=1;k<N;k++)sum+=(k%2===0?2:4)*evaluate(expr,a+k*h);return sum*h/3}catch(_){return NaN}}
function solveQuadratic(a,b,c){var disc=b*b-4*a*c;if(disc<0)return 'No real roots (Δ='+disc.toFixed(4)+'<0)';var s=Math.sqrt(disc);return 'x₁='+((-b+s)/(2*a)).toFixed(6)+', x₂='+((-b-s)/(2*a)).toFixed(6)}
function factorQuadratic(a,b,c){function gcd(m,n){return n?gcd(n,m%n):Math.abs(m)}for(var p=1;p<=Math.abs(a);p++){if(a%p!==0)continue;var r=a/p;for(var q=-Math.abs(c);q<=Math.abs(c);q++){if(q===0||c%q!==0)continue;var s=c/q;if(p*s+r*q===b){var fp=p>0?(p===1?'':p):(p===-1?'-':p),fr=r>0?(r===1?'':r):(r===-1?'-':r);var sq=q>0?'+'+q:String(q),ss=s>0?'+'+s:String(s);return '('+fp+'x'+sq+')('+fr+'x'+ss+')';}}}return null;}

function doAlgebra(expr,mode){
  try{switch(mode){
    case '解方程/组':{if(expr.indexOf(',')>0){var eqs=expr.split(',').map(function(e){return e.trim()});return {result:'System: '+eqs.join(' , '),steps:['Frontend only supports single equations']}}
      var hasX2=/\bx\^2\b/.test(expr)||/\bx\*\*2/.test(expr);if(hasX2||(expr.indexOf('=')>=0)){var parts=expr.split('=');var left=parts[0],right=parts[1]||'0';
        try{var p=Poly.fromStr(left+'-('+right+')');var aa=p.terms[2]||0,bb=p.terms[1]||0,cc=p.terms[0]||0;if(aa!==0&&(bb!==0||cc!==0)){var dr=solveQuadratic(aa,bb,cc);return {result:dr,steps:['Eq: '+expr,'Move: '+p.toString()+' = 0','Quadratic formula']};}}catch(_){}}return {result:'Use = sign: e.g. x^2-5*x+6=0',steps:[]};}
    case '因式分解':{try{var pp=Poly.fromStr(expr);var a2=pp.terms[2]||0,b2=pp.terms[1]||0,c2=pp.terms[0]||0;if(a2!==0){var fac=factorQuadratic(a2,b2,c2);if(fac)return {result:fac,steps:['Expr: '+expr,'Factor: '+fac]};return {result:'Cannot factor with integer coefficients',steps:['Expr: '+expr]};}return {result:'Only quadratic trinomials supported',steps:['Expr: '+expr]};}catch(e){return {result:'Error: '+e.message,steps:[]};}}
    case '展开':{try{var pp3=Poly.fromStr(expr);return {result:pp3.toString(),steps:['Expr: '+expr,'Expand: '+pp3.toString()]};}catch(e){return {result:'Error: '+e.message,steps:[]};}}
    case '表达式化简':{try{var pp5=Poly.fromStr(expr);return {result:pp5.toString(),steps:['Expr: '+expr,'Simplify: '+pp5.toString()]};}catch(e){return {result:'Error: '+e.message,steps:[]};}}
    case '求导':{var fn=expr.trim();for(var key in DERIV_RULES){if(fn===key||fn==='d/dx '+key){return {result:DERIV_RULES[key],steps:['f(x) = '+fn,"f'(x) = "+DERIV_RULES[key]]};}}
      try{var ppd=Poly.fromStr(fn);var dTerms={};var keys=Object.keys(ppd.terms).map(Number);for(var i=0;i<keys.length;i++){var d=keys[i],c=ppd.terms[d];if(d>0)dTerms[d-1]=c*d}var dp=new Poly(dTerms);return {result:dp.toString()||'0',steps:['f(x) = '+fn,"f'(x) = "+dp.toString()]};}catch(_){}
      var nd=numericDerivative(fn,2);if(!isNaN(nd))return {result:"f'(2) ≈ "+nd.toFixed(6),steps:['f(x) = '+fn,'Numerical derivative at x=2','≈ '+nd.toFixed(6)]};return {result:'Cannot differentiate',steps:[]};}
    case '不定积分':{var fn2=expr.trim();for(var k2 in INTEGRAL_RULES){if(fn2===k2){return {result:INTEGRAL_RULES[k2]+' + C',steps:['f(x) = '+fn2,'∫ = '+INTEGRAL_RULES[k2]+' + C']};}}
      try{var ppi=Poly.fromStr(fn2);var iTerms={};var keys2=Object.keys(ppi.terms).map(Number);for(var j=0;j<keys2.length;j++){var dd2=keys2[j],cc2=ppi.terms[dd2];iTerms[dd2+1]=cc2/(dd2+1)}var ip=new Poly(iTerms);return {result:ip.toString()+' + C',steps:['f(x) = '+fn2,'∫ = '+ip.toString()+' + C']};}catch(_){}
      var ni=numericIntegral(fn2,0,2);if(!isNaN(ni))return {result:'∫₀² '+fn2+' dx ≈ '+ni.toFixed(6)+' + C',steps:['Numerical integration [0,2]','≈ '+ni.toFixed(6)]};return {result:'Cannot integrate',steps:[]};}
    case '定积分':{var parts3=expr.split(',').map(function(s){return s.trim()});var f3=parts3[0],a3=+parts3[1]||0,b3=+parts3[2]||1;var val=numericIntegral(f3,a3,b3);if(!isNaN(val))return {result:val.toFixed(6),steps:['∫['+a3+','+b3+'] '+f3+' dx','Simpson (n=500)','≈ '+val.toFixed(6)]};return {result:'Integration failed',steps:[]};}
    case '极限':{var parts4=expr.split(',').map(function(s){return s.trim()});var f4=parts4[0],x0=+(parts4[2]||'0');var eps=1e-8,left=evaluate(f4,x0-eps),right=evaluate(f4,x0+eps);if(Math.abs(left-right)<1e-4)return {result:left.toFixed(6),steps:['lim[x→'+x0+'] '+f4,'Left ≈ '+left.toFixed(8),'Right ≈ '+right.toFixed(8),'= '+left.toFixed(6)]};return {result:'Limit does not exist',steps:['Left ≈ '+left.toFixed(6),'Right ≈ '+right.toFixed(6)]};}
    case '判别式':{try{var pp8=Poly.fromStr(expr);var a8=pp8.terms[2]||0,b8=pp8.terms[1]||0,c8=pp8.terms[0]||0;var disc=b8*b8-4*a8*c8;var desc=disc>0?'Two distinct real roots':disc===0?'One double root':'No real roots';return {result:'Δ = '+disc.toFixed(4)+' ('+desc+')',steps:['a='+a8+', b='+b8+', c='+c8,'Δ=b²-4ac='+disc.toFixed(4),desc]};}catch(e){return {result:'Error: need ax²+bx+c form',steps:[]};}}
    case '韦达定理':{try{var pp9=Poly.fromStr(expr);var a9=pp9.terms[2]||0,b9=pp9.terms[1]||0,c9=pp9.terms[0]||0;var sum=-b9/a9,prod=c9/a9;return {result:'x₁+x₂='+sum.toFixed(4)+', x₁·x₂='+prod.toFixed(4),steps:['For '+a9+'x²+'+b9+'x+'+c9+'=0','Sum: -b/a = '+sum.toFixed(4),'Product: c/a = '+prod.toFixed(4)]};}catch(e){return {result:'Error: need ax²+bx+c form',steps:[]};}}
    case '数列通项':{var parts5=expr.split(',').map(function(s){return s.trim()});var formula=parts5[0],n5=+parts5[1]||10;var terms=[];for(var t=1;t<=Math.min(n5,20);t++)terms.push(evaluate(formula.replace(/n/g,'('+t+')')));return {result:'a₁…aₙ: '+terms.map(function(v){return fmtResult(v)}).join(', '),steps:['a_n = '+formula,'First '+n5+' terms']};}
    case '等差数列求和':{var parts6=expr.split(',').map(function(s){return s.trim()});var a6=+parts6[0]||1,d6=+parts6[1]||1,n6=+parts6[2]||10;var sum6=n6*(2*a6+(n6-1)*d6)/2;return {result:sum6.toFixed(6),steps:['a₁='+a6+', d='+d6+', n='+n6,'S_n = n(2a₁+(n-1)d)/2 = '+sum6.toFixed(6)]};}
    case '等比数列求和':{var parts7=expr.split(',').map(function(s){return s.trim()});var a7=+parts7[0]||1,q7=+parts7[1]||2,n7=+parts7[2]||10;var sum7=q7===1?a7*n7:a7*(1-Math.pow(q7,n7))/(1-q7);return {result:sum7.toFixed(6),steps:['a₁='+a7+', q='+q7+', n='+n7,'S_n = a₁(1-q^n)/(1-q) = '+sum7.toFixed(6)]};}
    case '复数运算':{var ce=expr.replace(/[ij]/g,'i');try{var cv=parseComplex(ce);return {result:'('+cv.real.toFixed(4)+') + ('+cv.imag.toFixed(4)+')i',steps:['Complex: '+expr,'Real: '+cv.real.toFixed(4),'Imag: '+cv.imag.toFixed(4)]};}catch(e){return {result:'Parse failed',steps:[]};}}
    case '排列数':{var parts8=expr.split(',').map(function(s){return s.trim()});var n8=+parts8[0],m8=+parts8[1]||2;var r8=1;for(var i2=0;i2<m8;i2++)r8*=(n8-i2);return {result:'P('+n8+','+m8+') = '+r8,steps:['P('+n8+','+m8+')','= '+r8]};}
    case '组合数':{var parts9=expr.split(',').map(function(s){return s.trim()});var n9=+parts9[0],m9=+parts9[1]||2;var rn=1,rm=1;for(var i3=0;i3<m9;i3++){rn*=(n9-i3);rm*=(i3+1)}return {result:'C('+n9+','+m9+') = '+Math.round(rn/rm),steps:['C('+n9+','+m9+')','= '+Math.round(rn/rm)]};}
    case '解不等式/组':{return {result:'Inequality solving requires backend',steps:['Frontend limitation']};}
    default:return {result:'Select a calculation mode',steps:[]};
  }}catch(e){return {result:'Error: '+(e.message||e),steps:[]};}
}
function parseComplex(s){s=s.replace(/[ij]/g,'i');var real=0,imag=0;var m=s.match(/([+-]?\d*\.?\d*)\s*([+-])\s*(\d*\.?\d*)\s*\*?\s*i/);if(m){real=+m[1];imag=(m[2]==='-'?-1:1)*(+m[3]||1);return{real:real,imag:imag}}m=s.match(/([+-]?\d*\.?\d*)\s*i/);if(m){imag=+m[1]||1;return{real:0,imag:imag}}return{real:+s||0,imag:0};}

function doAlgShow(expr,mode,inputEl){
  var res=doAlgebra(expr,mode);var resultEl=document.getElementById('algResult');
  var html='';if(res.steps&&res.steps.length)html+='<div class="steps">'+res.steps.map(function(s){return s.replace(/</g,'&lt;')}).join('<br>')+'</div>';
  html+='<div class="answer">'+String(res.result).replace(/</g,'&lt;')+'</div>';

  if(containsX(expr)){var canvasId='plotCanvasAlg';var c=document.getElementById(canvasId);if(!c){var container=document.getElementById('algPlotContainer');if(container){container.innerHTML='<canvas id="'+canvasId+'"></canvas>';setTimeout(function(){draw2D(expr,canvasId)},50)}}else draw2D(expr,canvasId)}
}

/* ── 2D 函数绘图工作区（左右分栏，匹配 PlotWorkspace）── */
var plotFnCounter=1;
function renderPlot2D(){
  workspace.innerHTML='<div class="workspace-header"><div class="ws-title">📈 普通模式</div><div class="ws-desc">支持：显式 y=f(x)、隐式 f(x,y)=0、参数滑块</div></div><div class="plot-layout"><div class="plot-left"><div style="font-size:11px;color:var(--text-subtle);margin-bottom:8px" id="plotStatus">就绪</div><div id="plotFnList" style="display:flex;flex-direction:column;gap:4px"></div><button class="btn-add" id="plotAddBtn" style="border:1px solid var(--border);margin-top:6px">＋ 添加函数</button><div class="presets" style="margin-top:10px"><button data-fn="sin(x)">sin(x)</button><button data-fn="tan(x)">tan(x)</button><button data-fn="x^2">x²</button><button data-fn="x^3-3*x">x³−3x</button><button data-fn="exp(-x^2)*cos(5*x)">e^(−x²)·cos(5x)</button><button data-fn="sin(x)/x">sinc(x)</button></div><div class="plot-legend" id="plotLegend"></div></div><div class="plot-right"><canvas id="plotCanvas"></canvas></div></div>';
  plotFnCounter=1;
  addPlotFn();
  bindPlot2DEvents();
  setTimeout(function(){drawAllPlotFns()},150);
}

function addPlotFn(){
  var list=document.getElementById('plotFnList');if(!list)return;
  var color=PLOT_COLORS[(plotFnCounter-1)%PLOT_COLORS.length];
  var html='<div class="plot-fn-row" data-plot-id="'+plotFnCounter+'">'+
    '<span class="fn-color" style="background:'+color+'" title="曲线颜色"></span>'+
    '<input type="text" class="plot-fn-input" placeholder="f(x) = sin(x)" value="'+(plotFnCounter===1?'sin(x)':'')+'">'+
    '<button class="btn-delete plot-fn-del">✕</button></div>';
  var wrapper=document.createElement('div');wrapper.innerHTML=html;
  list.appendChild(wrapper.firstElementChild);
  bindPlotFnEvents(list.lastElementChild);
  plotFnCounter++;
}

function bindPlotFnEvents(row){
  var input=row.querySelector('.plot-fn-input'),delBtn=row.querySelector('.plot-fn-del');
  if(input)input.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();drawAllPlotFns()}});
  if(delBtn)delBtn.addEventListener('click',function(){
    var all=document.getElementById('plotFnList').querySelectorAll('.plot-fn-row');
    if(all.length<=1)return;row.remove();drawAllPlotFns();
  });
}

function drawAllPlotFns(){
  var rows=document.getElementById('plotFnList').querySelectorAll('.plot-fn-row');
  if(!rows.length)return;
  var canvas=document.getElementById('plotCanvas'),ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1;
  var parent=canvas.parentElement,rect=parent.getBoundingClientRect();
  var w=rect.width-4,h=Math.max(380,rect.height-8);
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);

  var pad={top:30,right:30,bottom:40,left:56};
  var pw=w-pad.left-pad.right,ph=h-pad.top-pad.bottom;
  var xMin=-5,xMax=5,N=Math.min(800,Math.round(pw*2));
  var isDark=getTheme()==='dark';
  var allPts=[];

  for(var ri=0;ri<rows.length;ri++){
    var input=rows[ri].querySelector('.plot-fn-input');
    var fnExpr=(input?input.value.trim():'')||'x';
    var pts=[],yMin=Infinity,yMax=-Infinity;
    for(var i=0;i<=N;i++){
      var xv=xMin+(xMax-xMin)*i/N,yv;
      try{yv=evaluate(fnExpr,xv)}catch(_){continue}
      if(typeof yv!=='number'||!isFinite(yv)||Math.abs(yv)>1000)continue;
      if(pts.length>0&&Math.abs(yv-pts[pts.length-1].y)>100)pts.push(null);
      pts.push({x:xv,y:yv});if(yv<yMin)yMin=yv;if(yv>yMax)yMax=yv;
    }
    allPts.push({pts:pts,color:PLOT_COLORS[ri%PLOT_COLORS.length],fn:fnExpr,yMin:yMin,yMax:yMax});
  }

  var yMin=Infinity,yMax=-Infinity;
  for(var ai=0;ai<allPts.length;ai++){if(isFinite(allPts[ai].yMin)&&allPts[ai].yMin<yMin)yMin=allPts[ai].yMin;if(isFinite(allPts[ai].yMax)&&allPts[ai].yMax>yMax)yMax=allPts[ai].yMax}
  if(!isFinite(yMin)){yMin=-5;yMax=5}
  var yr=yMax-yMin||2;yMin-=yr*.1;yMax+=yr*.1;
  function tx(x){return pad.left+(x-xMin)/(xMax-xMin)*pw}
  function ty(y){return pad.top+(yMax-y)/(yMax-yMin)*ph}

  ctx.fillStyle=isDark?'#181825':'#fcfdfd';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle=isDark?'#313244':'#e2e8f0';ctx.lineWidth=.5;
  var xStep=xMax-xMin>10?2:1;
  for(var gx=Math.ceil(xMin);gx<=xMax;gx+=xStep){ctx.beginPath();ctx.moveTo(tx(gx),pad.top);ctx.lineTo(tx(gx),h-pad.bottom);ctx.stroke()}
  var yExt=yMax-yMin,yStep=yExt>20?5:yExt>10?2:yExt>4?1:.5;
  for(var gy=Math.ceil(yMin/yStep)*yStep;gy<=yMax;gy+=yStep){ctx.beginPath();ctx.moveTo(pad.left,ty(gy));ctx.lineTo(w-pad.right,ty(gy));ctx.stroke()}

  var axisColor=isDark?'#cdd6f4':'#1e293b';
  ctx.strokeStyle=axisColor;ctx.lineWidth=1.5;
  if(yMin<=0&&yMax>=0){ctx.beginPath();ctx.moveTo(pad.left,ty(0));ctx.lineTo(w-pad.right,ty(0));ctx.stroke()}
  if(xMin<=0&&xMax>=0){ctx.beginPath();ctx.moveTo(tx(0),pad.top);ctx.lineTo(tx(0),h-pad.bottom);ctx.stroke()}

  var tickColor=isDark?'#a6adc8':'#64748b';
  ctx.fillStyle=tickColor;ctx.font='11px "Segoe UI",system-ui,sans-serif';ctx.textAlign='center';
  for(var txv=Math.ceil(xMin);txv<=xMax;txv+=xStep)ctx.fillText(txv,tx(txv),h-pad.bottom+16);
  ctx.textAlign='right';
  for(var tyv=Math.ceil(yMin/yStep)*yStep;tyv<=yMax;tyv+=yStep){if(Math.abs(tyv)<.001)continue;ctx.fillText(Number(tyv.toFixed(2)),pad.left-6,ty(tyv)+4)}

  ctx.fillStyle=axisColor;
  ctx.beginPath();var ax=w-pad.right+10,ay=ty(0);ctx.moveTo(ax,ay);ctx.lineTo(ax-8,ay-4);ctx.lineTo(ax-8,ay+4);ctx.fill();
  ctx.beginPath();var bx=tx(0),by=pad.top-10;ctx.moveTo(bx,by);ctx.lineTo(bx-4,by+8);ctx.lineTo(bx+4,by+8);ctx.fill();
  ctx.textAlign='right';ctx.fillText('O',tx(0)-6,ty(0)+14);
  ctx.font='bold 13px "Segoe UI",system-ui,sans-serif';ctx.textAlign='center';
  ctx.fillText('x',w-pad.right+10,ty(0)+16);ctx.fillText('y',tx(0),pad.top-12);

  /* 绘制所有曲线 */
  var legend=document.getElementById('plotLegend');if(legend)legend.innerHTML='';
  for(var ai=0;ai<allPts.length;ai++){
    var d=allPts[ai],color=d.color;
    ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
    var drawing=false;
    for(var k=0;k<d.pts.length;k++){
      if(d.pts[k]===null){drawing=false;continue}
      var px=tx(d.pts[k].x),py=ty(d.pts[k].y);
      if(!drawing){ctx.beginPath();ctx.moveTo(px,py);drawing=true}else ctx.lineTo(px,py);
    }
    ctx.stroke();
    if(legend)legend.innerHTML+='<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:2px;background:'+color+'"></span>'+d.fn+'</span>';
  }
  document.getElementById('plotStatus').textContent='已渲染 '+allPts.length+' 条曲线';
}

function bindPlot2DEvents(){
  document.getElementById('plotAddBtn').addEventListener('click',function(){addPlotFn();drawAllPlotFns()});
  var presets=document.querySelector('#workspace .presets');
  if(presets)presets.addEventListener('click',function(e){
    var btn=e.target.closest('button');if(!btn||!btn.dataset.fn)return;
    var first=document.getElementById('plotFnList').querySelector('.plot-fn-row');
    if(first){var inp=first.querySelector('.plot-fn-input');if(inp)inp.value=btn.dataset.fn}
    drawAllPlotFns();
  });
}

/* ── 微积分工作区 ── */
function renderCalculus(){
  workspace.innerHTML='<div class="workspace-header"><div class="ws-title">∫ 微积分</div><div class="ws-desc">求导、不定积分、定积分、极限计算</div></div><div class="work-card"><h3>求导</h3><div class="calc-row" style="margin-bottom:12px"><input id="calDerivIn" type="text" placeholder="sin(x)*cos(x)"><select id="calDerivPt"><option value="2">x=2</option><option value="0">x=0</option><option value="1">x=1</option><option value="expr">符号求导</option></select><button class="btn-calc" id="calDerivBtn">求导</button></div><div class="result-box" id="calDerivRes"></div></div><div class="work-card"><h3>积分</h3><div class="calc-row" style="margin-bottom:12px"><input id="calIntegIn" type="text" placeholder="x^2*sin(x)"><select id="calIntegTp"><option value="indef">不定积分</option><option value="def">定积分 [0,2]</option></select><button class="btn-calc" id="calIntegBtn">积分</button></div><div class="result-box" id="calIntegRes"></div></div><div class="work-card"><h3>极限</h3><div class="calc-row"><input id="calLimitIn" type="text" placeholder="sin(x)/x"><select id="calLimitPt"><option value="0">x→0</option><option value="1">x→1</option><option value="2">x→2</option><option value="inf">x→∞</option></select><button class="btn-calc" id="calLimitBtn">求极限</button></div><div class="result-box" id="calLimitRes"></div></div><div class="plot-card" style="margin-top:14px"><div class="header">函数图像</div><canvas id="plotCanvasCalc"></canvas></div>';
  bindCalcEvents();

function bindCalcEvents(){
  var di=document.getElementById('calDerivIn'),db=document.getElementById('calDerivBtn'),dr=document.getElementById('calDerivRes'),dp=document.getElementById('calDerivPt');
  if(db)db.addEventListener('click',function(){var e=(di?di.value.trim():'')||'x^2',p=dp?dp.value:'2';draw2D(e,'plotCanvasCalc');
    if(p==='expr'){dr.innerHTML='<div class="answer">'+doAlgebra(e,'求导').result+'</div>'}else{var nd=numericDerivative(e,+p);dr.innerHTML='<div class="steps">f(x) = '+e+'</div><div class="answer">f\'('+p+') ≈ '+nd.toFixed(8)+'</div>'}});
  var ii=document.getElementById('calIntegIn'),ib=document.getElementById('calIntegBtn'),ir=document.getElementById('calIntegRes'),it=document.getElementById('calIntegTp');
  if(ib)ib.addEventListener('click',function(){var e=(ii?ii.value.trim():'')||'x^2',t=it?it.value:'indef';draw2D(e,'plotCanvasCalc');ir.innerHTML='<div class="answer">'+doAlgebra(e,t==='indef'?'不定积分':'定积分').result+'</div>'});
  var li=document.getElementById('calLimitIn'),lb=document.getElementById('calLimitBtn'),lr=document.getElementById('calLimitRes'),lp=document.getElementById('calLimitPt');
  if(lb)lb.addEventListener('click',function(){var e=(li?li.value.trim():'')||'sin(x)/x',pt=lp?lp.value:'0';draw2D(e,'plotCanvasCalc');
    if(pt==='inf'){try{lr.innerHTML='<div class="answer">lim[x→∞] ≈ '+fmtResult(evaluate(e,1e8))+'</div>'}catch(ex){lr.innerHTML='<div class="answer">计算失败</div>'}}
    else lr.innerHTML='<div class="answer">'+doAlgebra(e+',x,'+pt,'极限').result+'</div>'});
}

/* ── 解析几何工作区 ── */
function renderAnalGeo(){
  workspace.innerHTML='<div class="workspace-header"><div class="ws-title">📏 解析几何</div><div class="ws-desc">坐标几何：距离、中点、直线、圆、三角形面积</div></div><div class="work-card"><h3>两点距离 & 中点</h3><div class="calc-row" style="margin-bottom:12px">P₁(<input type="number" id="geoX1" value="0" style="width:70px;flex:0 0 auto">,<input type="number" id="geoY1" value="0" style="width:70px;flex:0 0 auto">) P₂(<input type="number" id="geoX2" value="3" style="width:70px;flex:0 0 auto">,<input type="number" id="geoY2" value="4" style="width:70px;flex:0 0 auto">)<button class="btn-calc" id="geoDistBtn">计算</button></div><div class="result-box" id="geoDistRes"></div></div><div class="work-card"><h3>直线方程（两点式）</h3><div class="calc-row" style="margin-bottom:12px">A(<input type="number" id="lineX1" value="1" style="width:70px;flex:0 0 auto">,<input type="number" id="lineY1" value="2" style="width:70px;flex:0 0 auto">) B(<input type="number" id="lineX2" value="4" style="width:70px;flex:0 0 auto">,<input type="number" id="lineY2" value="8" style="width:70px;flex:0 0 auto">)<button class="btn-calc" id="lineBtn">求直线</button></div><div class="result-box" id="lineRes"></div></div><div class="work-card"><h3>三角形面积</h3><div class="calc-row" style="margin-bottom:12px">a=<input type="number" id="triA" value="3" style="width:70px;flex:0 0 auto" step="any"> b=<input type="number" id="triB" value="4" style="width:70px;flex:0 0 auto" step="any"> c=<input type="number" id="triC" value="5" style="width:70px;flex:0 0 auto" step="any"><button class="btn-calc" id="triBtn">计算面积</button></div><div class="result-box" id="triRes"></div></div>';
  bindAnalGeoEvents();
}
function bindAnalGeoEvents(){
  var gdb=document.getElementById('geoDistBtn');if(gdb)gdb.addEventListener('click',function(){var x1=+document.getElementById('geoX1').value,y1=+document.getElementById('geoY1').value,x2=+document.getElementById('geoX2').value,y2=+document.getElementById('geoY2').value;var d=Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1));var mx=(x1+x2)/2,my=(y1+y2)/2;document.getElementById('geoDistRes').innerHTML='<div class="answer">距离: '+d.toFixed(6)+' | 中点: ('+mx.toFixed(4)+', '+my.toFixed(4)+')</div>'});
  var lb=document.getElementById('lineBtn');if(lb)lb.addEventListener('click',function(){var x1=+document.getElementById('lineX1').value,y1=+document.getElementById('lineY1').value,x2=+document.getElementById('lineX2').value,y2=+document.getElementById('lineY2').value;var dx=x2-x1,dy=y2-y1;var A=dy,B=-dx,C=dx*y1-dy*x1;var slope=dx===0?'无穷大(垂直)':(dy/dx).toFixed(4);document.getElementById('lineRes').innerHTML='<div class="answer">'+A.toFixed(2)+'x + ('+B.toFixed(2)+')y + ('+C.toFixed(2)+') = 0<br>斜率: '+slope+'</div>'});
  var tb=document.getElementById('triBtn');if(tb)tb.addEventListener('click',function(){var a=+document.getElementById('triA').value,b=+document.getElementById('triB').value,c=+document.getElementById('triC').value;var s=(a+b+c)/2;var area=Math.sqrt(Math.max(0,s*(s-a)*(s-b)*(s-c)));document.getElementById('triRes').innerHTML='<div class="answer">面积 (Heron): '+area.toFixed(6)+'</div>'});
}

/* ── 线性代数工作区 ── */
function renderLinearAlgebra(){
  workspace.innerHTML='<div class="workspace-header"><div class="ws-title">📊 线性代数</div><div class="ws-desc">矩阵运算：行列式、求逆、转置、矩阵乘法</div></div><div class="work-card"><h3>矩阵 A</h3><div style="margin:8px 0;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><label style="font-size:13px;color:var(--text-muted)">行:<select id="matRows"><option>2</option><option selected>3</option><option>4</option></select></label><label style="font-size:13px;color:var(--text-muted)">列:<select id="matCols"><option>2</option><option selected>3</option><option>4</option></select></label><button class="btn-calc-sm" id="matBuildBtn">创建</button><span style="margin-left:12px;font-size:13px;color:var(--text-muted)">操作:</span><select id="matOp"><option>行列式</option><option>求逆</option><option>转置</option></select><button class="btn-calc" id="matComputeBtn">计算</button></div><div id="matContainer"></div><div class="result-box" id="matResult"></div></div><div class="work-card"><h3>矩阵乘法 A×B</h3><div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start"><div id="matACont"></div><div style="font-size:24px;color:var(--text-muted);align-self:center">×</div><div id="matBCont"></div><button class="btn-calc" id="matMulBtn" style="align-self:center">计算</button></div><div class="result-box" id="matMulResult" style="margin-top:12px"></div></div>';
  bindLAEvents();
}
function buildMatInput(cid,r,c){var el=document.getElementById(cid);if(!el)return;el.innerHTML='<div class="matrix-grid" style="grid-template-columns:repeat('+c+',64px)">';for(var ri=0;ri<r;ri++)for(var ci=0;ci<c;ci++)el.innerHTML+='<input type="number" value="'+(ri===ci?1:0)+'" step="any">';el.innerHTML+='</div>'}
function readMat(cid){var el=document.getElementById(cid);if(!el)return null;var inp=el.querySelectorAll('input'),rows=[],row=[],cols=0;for(var i=0;i<inp.length;i++){row.push(+(inp[i].value)||0);if(row.length===Math.sqrt(inp.length)||(cols>0&&row.length===cols)){rows.push(row);if(!cols)cols=row.length;row=[]}}if(row.length)rows.push(row);return rows}
function bindLAEvents(){
  var bb=document.getElementById('matBuildBtn');if(!bb)return;
  bb.addEventListener('click',function(){var r=+document.getElementById('matRows').value,c=+document.getElementById('matCols').value;buildMatInput('matContainer',r,c);buildMatInput('matACont',r,c);buildMatInput('matBCont',c,r)});
  var cb=document.getElementById('matComputeBtn');if(cb)cb.addEventListener('click',function(){
    var m=readMat('matContainer');if(!m)return;var op=document.getElementById('matOp').value,n=m.length,cn=m[0].length,re=document.getElementById('matResult');
    if(op==='转置'){var t=[];for(var j=0;j<cn;j++){t[j]=[];for(var i=0;i<n;i++)t[j][i]=m[i][j]}re.innerHTML='<div class="answer">'+JSON.stringify(t)+'</div>'}
    else if(op==='行列式'){if(n!==cn){re.innerHTML='<span style="color:#ef4444">需要方阵</span>';return}function det(a){var nn=a.length;if(nn===1)return a[0][0];if(nn===2)return a[0][0]*a[1][1]-a[0][1]*a[1][0];var d=0;for(var jj=0;jj<nn;jj++){var sub=[];for(var ii=1;ii<nn;ii++){sub[ii-1]=[];for(var jj2=0;jj2<nn;jj2++)if(jj2!==jj)sub[ii-1].push(a[ii][jj2])}d+=(jj%2?-1:1)*a[0][jj]*det(sub)}return d}re.innerHTML='<div class="answer">det = '+det(m).toFixed(6)+'</div>'}
    else if(op==='求逆'){if(n!==cn){re.innerHTML='<span style="color:#ef4444">需要方阵</span>';return}
      function inv(aa){var nn=aa.length,aug=[];for(var i2=0;i2<nn;i2++){aug[i2]=aa[i2].slice();for(var j3=0;j3<nn;j3++)aug[i2].push(i2===j3?1:0)}
        for(var i3=0;i3<nn;i3++){var pv=aug[i3][i3];if(Math.abs(pv)<1e-10)return null;for(var j4=0;j4<2*nn;j4++)aug[i3][j4]/=pv;for(var i4=0;i4<nn;i4++){if(i4===i3)continue;var f=aug[i4][i3];for(var j5=0;j5<2*nn;j5++)aug[i4][j5]-=f*aug[i3][j5]}}var invv=[];for(var i5=0;i5<nn;i5++)invv[i5]=aug[i5].slice(nn);return invv}
      var iv=inv(m);re.innerHTML=iv?'<div class="answer">'+JSON.stringify(iv.map(function(r){return r.map(function(v){return +v.toFixed(4)})}))+'</div>':'<span style="color:#ef4444">矩阵不可逆</span>'}});
  var mb=document.getElementById('matMulBtn');if(mb)mb.addEventListener('click',function(){var A=readMat('matACont'),B=readMat('matBCont'),re=document.getElementById('matMulResult');if(!A||!B||A[0].length!==B.length){re.innerHTML='<span style="color:#ef4444">维度不匹配</span>';return}var C=[];for(var ii=0;ii<A.length;ii++){C[ii]=[];for(var jj=0;jj<B[0].length;jj++){C[ii][jj]=0;for(var kk=0;kk<B.length;kk++)C[ii][jj]+=A[ii][kk]*B[kk][jj]}}re.innerHTML='<div class="answer">'+JSON.stringify(C.map(function(r){return r.map(function(v){return +v.toFixed(4)})}))+'</div>'});
  bb.click();
}

/* ── 概率统计工作区 ── */
function renderProbability(){
  workspace.innerHTML='<div class="workspace-header"><div class="ws-title">🎲 概率论与数理统计</div><div class="ws-desc">描述性统计、概率分布、排列组合</div></div><div class="work-card"><h3>描述性统计</h3><div class="calc-row" style="margin-bottom:12px"><input id="statsInput" type="text" placeholder="输入数值，逗号分隔：1,2,3,4,5" style="flex:2"><button class="btn-calc" id="statsBtn">计算统计量</button></div><div class="result-box" id="statsResult"></div></div><div class="work-card"><h3>二项分布</h3><div class="calc-row" style="margin-bottom:12px">n=<input type="number" id="binomN" value="10" style="width:70px;flex:0 0 auto"> p=<input type="number" id="binomP" value="0.5" style="width:70px;flex:0 0 auto" step="any"> k=<input type="number" id="binomK" value="5" style="width:70px;flex:0 0 auto"><button class="btn-calc" id="binomBtn">P(X=k)</button></div><div class="result-box" id="binomResult"></div></div><div class="work-card"><h3>排列组合</h3><div class="calc-row">n=<input type="number" id="pcN" value="10" style="width:70px;flex:0 0 auto"> k=<input type="number" id="pcK" value="3" style="width:70px;flex:0 0 auto"><button class="btn-calc" id="pcPermBtn">P(n,k)</button><button class="btn-calc" id="pcCombBtn" style="margin-left:4px">C(n,k)</button></div><div class="result-box" id="pcResult" style="margin-top:12px"></div></div>';
  bindProbEvents();
}
function bindProbEvents(){
  var sb=document.getElementById('statsBtn');if(sb)sb.addEventListener('click',function(){var s=document.getElementById('statsInput').value.trim();if(!s){document.getElementById('statsResult').innerHTML='<span style="color:#ef4444">请输入数据</span>';return}var arr=s.split(',').map(Number).filter(function(v){return!isNaN(v)});if(!arr.length){document.getElementById('statsResult').innerHTML='<span style="color:#ef4444">无效数据</span>';return}arr.sort(function(a,b){return a-b});var n=arr.length,sum=0;for(var i=0;i<n;i++)sum+=arr[i];var mean=sum/n;var sumSq=0;for(var i=0;i<n;i++)sumSq+=(arr[i]-mean)*(arr[i]-mean);var std=Math.sqrt(sumSq/n);var median=n%2?arr[Math.floor(n/2)]:(arr[n/2-1]+arr[n/2])/2;document.getElementById('statsResult').innerHTML='<div class="steps">n='+n+' | 数据: '+arr.join(',')+'</div><div class="answer">均值: '+mean.toFixed(4)+' | 中位数: '+median.toFixed(4)+' | 标准差: '+std.toFixed(4)+'</div>'});
  var bb=document.getElementById('binomBtn');if(bb)bb.addEventListener('click',function(){var n=+document.getElementById('binomN').value,p=+document.getElementById('binomP').value,k=+document.getElementById('binomK').value;function comb(nn,kk){if(kk>nn||kk<0)return 0;var r=1;for(var i=1;i<=kk;i++){r=r*(nn-kk+i)/i}return Math.round(r)}var prob=comb(n,k)*Math.pow(p,k)*Math.pow(1-p,n-k);document.getElementById('binomResult').innerHTML='<div class="steps">n='+n+', p='+p+', k='+k+'</div><div class="answer">P(X='+k+') = '+prob.toFixed(8)+'</div>'});
  function bindPC(bid,type){var b=document.getElementById(bid);if(b)b.addEventListener('click',function(){var n=+document.getElementById('pcN').value,k=+document.getElementById('pcK').value;var r=1;for(var i=0;i<k;i++)r*=(n-i);document.getElementById('pcResult').innerHTML='<div class="answer">'+(type==='P'?'P':'C')+'('+n+','+k+') = '+(type==='P'?r:Math.round(r/fact(k)))+'</div>'})}function fact(x){var r=1;for(var i=2;i<=x;i++)r*=i;return r}
  bindPC('pcPermBtn','P');bindPC('pcCombBtn','C');
}

/* ── 数值分析工作区 ── */
function renderNumerical(){
  workspace.innerHTML='<div class="workspace-header"><div class="ws-title">🔢 数值分析</div><div class="ws-desc">牛顿法求根、二分法、Lagrange 插值</div></div><div class="work-card"><h3>牛顿法求根</h3><div class="calc-row" style="margin-bottom:12px">f(x)=<input id="newtFn" type="text" placeholder="x^3-2*x-5" style="flex:2"> x₀=<input type="number" id="newtX0" value="2" style="width:70px;flex:0 0 auto"><button class="btn-calc" id="newtBtn">迭代</button></div><div class="result-box" id="newtResult"></div></div><div class="work-card"><h3>二分法求根</h3><div class="calc-row" style="margin-bottom:12px">f(x)=<input id="bisectFn" type="text" placeholder="x^3-x-2" style="flex:2"> [a,b]=[<input type="number" id="bisectA" value="1" style="width:70px;flex:0 0 auto">,<input type="number" id="bisectB" value="2" style="width:70px;flex:0 0 auto">]<button class="btn-calc" id="bisectBtn">求解</button></div><div class="result-box" id="bisectResult"></div></div><div class="work-card"><h3>Lagrange 插值</h3><div class="calc-row" style="margin-bottom:12px">点集:<input id="lagrInput" type="text" placeholder="(0,1),(2,5),(4,17)" style="flex:2"> 求x=<input type="number" id="lagrX" value="3" style="width:70px;flex:0 0 auto"><button class="btn-calc" id="lagrBtn">插值</button></div><div class="result-box" id="lagrResult"></div></div>';
  bindNumericalEvents();
}
function bindNumericalEvents(){
  var nb=document.getElementById('newtBtn');if(nb)nb.addEventListener('click',function(){var fn=document.getElementById('newtFn').value.trim()||'x^3-2*x-5',x=+document.getElementById('newtX0').value,steps=[],vals=[];for(var i=0;i<15;i++){var fx=evaluate(fn,x),fpx=numericDerivative(fn,x);if(Math.abs(fpx)<1e-12)break;var xn=x-fx/fpx;steps.push('x'+i+'='+x.toFixed(8)+' → ');if(Math.abs(xn-x)<1e-10){x=xn;break}x=xn;vals.push(x)}document.getElementById('newtResult').innerHTML='<div class="steps">'+steps.join('')+'</div><div class="answer">根 ≈ '+x.toFixed(10)+' (|f|='+Math.abs(evaluate(fn,x)).toExponential(2)+')</div>'});
  var bb=document.getElementById('bisectBtn');if(bb)bb.addEventListener('click',function(){var fn=document.getElementById('bisectFn').value.trim()||'x^3-x-2',a=+document.getElementById('bisectA').value,b=+document.getElementById('bisectB').value;var fa=evaluate(fn,a),fb=evaluate(fn,b);if(fa*fb>=0){document.getElementById('bisectResult').innerHTML='<span style="color:#ef4444">f(a)·f(b)≥0，无法保证根在区间内</span>';return}var m;for(var i=0;i<50;i++){m=(a+b)/2;var fm=evaluate(fn,m);if(fm===0||(b-a)/2<1e-10)break;if(fa*fm<0){b=m;fb=fm}else{a=m;fa=fm}}document.getElementById('bisectResult').innerHTML='<div class="answer">根 ≈ '+m.toFixed(10)+' (|f|='+Math.abs(evaluate(fn,m)).toExponential(2)+')</div>'});
  var lb=document.getElementById('lagrBtn');if(lb)lb.addEventListener('click',function(){var s=document.getElementById('lagrInput').value.trim(),x=+document.getElementById('lagrX').value;var pts=[],m;var re=/\(\s*([\d.-]+)\s*,\s*([\d.-]+)\s*\)/g;while((m=re.exec(s))!==null)pts.push({x:+m[1],y:+m[2]});if(pts.length<2){document.getElementById('lagrResult').innerHTML='<span style="color:#ef4444">至少需要2个点，格式: (0,1),(2,5)</span>';return}var result=0;for(var i=0;i<pts.length;i++){var term=pts[i].y;for(var j=0;j<pts.length;j++){if(i!==j)term*=(x-pts[j].x)/(pts[i].x-pts[j].x)}result+=term}document.getElementById('lagrResult').innerHTML='<div class="steps">插值点: '+pts.map(function(p){return '('+p.x+','+p.y+')'}).join(', ')+'</div><div class="answer">f('+x+') ≈ '+result.toFixed(8)+'</div>'});
}

/* ── 数论工作区 ── */
function renderNumberTheory(){
  workspace.innerHTML='<div class="workspace-header"><div class="ws-title">🔐 数论</div><div class="ws-desc">GCD/LCM、素数判定、质因数分解、欧拉函数</div></div><div class="work-card"><h3>GCD & LCM</h3><div class="calc-row" style="margin-bottom:12px">a=<input type="number" id="gcdA" value="48" style="width:80px;flex:0 0 auto"> b=<input type="number" id="gcdB" value="180" style="width:80px;flex:0 0 auto"><button class="btn-calc" id="gcdBtn">计算</button></div><div class="result-box" id="gcdResult"></div></div><div class="work-card"><h3>素数判定 & 因数分解</h3><div class="calc-row" style="margin-bottom:12px">n=<input type="number" id="primeN" value="1234567" style="width:140px;flex:0 0 auto"><button class="btn-calc" id="primeBtn">判定</button><button class="btn-calc" id="factorBtn" style="margin-left:4px">分解</button></div><div class="result-box" id="primeResult"></div></div><div class="work-card"><h3>欧拉函数 & 模逆元</h3><div class="calc-row">n=<input type="number" id="eulerN" value="60" style="width:80px;flex:0 0 auto"><button class="btn-calc" id="eulerBtn">φ(n)</button><span style="margin-left:8px;font-size:13px;color:var(--text-muted)">a⁻¹ mod m:</span> a=<input type="number" id="modinvA" value="3" style="width:70px;flex:0 0 auto"> m=<input type="number" id="modinvM" value="7" style="width:70px;flex:0 0 auto"><button class="btn-calc" id="modinvBtn">求逆</button></div><div class="result-box" id="eulerResult" style="margin-top:12px"></div></div>';
  bindNTEvents();
}
function bindNTEvents(){
  function gcd(a,b){return b?gcd(b,a%b):Math.abs(a)}
  function lcm(a,b){return Math.abs(a*b)/gcd(a,b)}
  var gb=document.getElementById('gcdBtn');if(gb)gb.addEventListener('click',function(){var a=+document.getElementById('gcdA').value,b=+document.getElementById('gcdB').value;document.getElementById('gcdResult').innerHTML='<div class="answer">gcd='+gcd(a,b)+' | lcm='+lcm(a,b)+'</div>'});
  function isPrime(n){if(n<2)return false;if(n%2===0)return n===2;if(n%3===0)return n===3;for(var i=5;i*i<=n;i+=6){if(n%i===0||n%(i+2)===0)return false}return true}
  function factorize(n){var factors=[],d=2,N=n;while(d*d<=N){while(N%d===0){factors.push(d);N/=d}d++}if(N>1)factors.push(N);return factors}
  var pb=document.getElementById('primeBtn');if(pb)pb.addEventListener('click',function(){var n=+document.getElementById('primeN').value;document.getElementById('primeResult').innerHTML='<div class="answer">'+n+(isPrime(n)?' 是素数':' 不是素数')+'</div>'});
  var fb=document.getElementById('factorBtn');if(fb)fb.addEventListener('click',function(){var n=+document.getElementById('primeN').value,f=factorize(n);document.getElementById('primeResult').innerHTML='<div class="steps">'+n+' 的质因数:</div><div class="answer">'+f.join(' × ')+'</div>'});
  var eb=document.getElementById('eulerBtn');if(eb)eb.addEventListener('click',function(){var n=+document.getElementById('eulerN').value,result=n,t=n;for(var p=2;p*p<=t;p++){if(t%p===0){while(t%p===0)t/=p;result-=result/p}}if(t>1)result-=result/t;document.getElementById('eulerResult').innerHTML='<div class="answer">φ('+n+') = '+result+'</div>'});
  var mi=document.getElementById('modinvBtn');if(mi)mi.addEventListener('click',function(){var a=+document.getElementById('modinvA').value,m=+document.getElementById('modinvM').value;function egcd(aa,bb){if(!bb)return[aa,1,0];var g=egcd(bb,aa%bb);return[g[0],g[2],g[1]-Math.floor(aa/bb)*g[2]]}var e=egcd(a,m);if(e[0]!==1){document.getElementById('eulerResult').innerHTML='<span style="color:#ef4444">无逆元: gcd('+a+','+m+')≠1</span>'}else{var inv=((e[1]%m)+m)%m;document.getElementById('eulerResult').innerHTML='<div class="answer">'+a+'⁻¹ mod '+m+' = '+inv+'</div>'}});
}

/* ── 极坐标绘图工作区 ── */
function renderPlotPolar(){
  workspace.innerHTML='<div class="workspace-header"><div class="ws-title">🔄 极坐标</div><div class="ws-desc">极坐标曲线 r=f(θ)，如心形线、玫瑰线、螺线</div></div><div class="work-card"><div class="calc-row" style="margin-bottom:12px"><input id="polarInput" type="text" placeholder="sin(3*x)、1+cos(x)"><button class="btn-calc" id="polarBtn">绘图</button></div><div class="presets"><button data-fn="sin(3*x)">三叶玫瑰线</button><button data-fn="1+cos(x)">心形线</button><button data-fn="x">阿基米德螺线</button><button data-fn="2*cos(2*x)">四叶玫瑰线</button><button data-fn="sin(x)/x">特殊曲线</button></div></div><div class="plot-card"><div class="header" id="polarTitle">r(θ) = sin(3θ)</div><canvas id="plotCanvasPolar"></canvas></div>';
  bindPolarEvents();
  setTimeout(function(){drawPolar('sin(3*x)','plotCanvasPolar')},100);
}
function drawPolar(fnExpr,canvasId){
  var canvas=document.getElementById(canvasId||'plotCanvasPolar');if(!canvas)return;
  var ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1,rect=canvas.parentElement.getBoundingClientRect();
  var w=Math.min(rect.width-4,1060),h=Math.round(w*0.55);
  canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);
  var pad={top:30,right:30,bottom:40,left:56},pw=w-pad.left-pad.right,ph=h-pad.top-pad.bottom,maxR=5,N=Math.min(1200,Math.round(pw*2)),pts=[];
  for(var i=0;i<=N;i++){var theta=0+(2*Math.PI*i/N),r;try{r=evaluate(fnExpr,theta)}catch(_){continue}if(typeof r!=='number'||!isFinite(r)||Math.abs(r)>50){if(pts.length)pts.push(null);continue}if(pts.length>0&&Math.abs(r-evaluate(fnExpr,theta-8*Math.PI/N))>20)pts.push(null);var xv=r*Math.cos(theta),yv=r*Math.sin(theta);if(Math.abs(xv)>maxR||Math.abs(yv)>maxR){if(pts.length)pts.push(null);continue}pts.push({x:xv,y:yv})}
  function tx(x){return pad.left+(x+maxR)/(2*maxR)*pw}function ty(y){return pad.top+(maxR-y)/(2*maxR)*ph}
  var isDark=getTheme()==='dark';ctx.fillStyle=isDark?'#181825':'#fcfdfd';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle=isDark?'#313244':'#e2e8f0';ctx.lineWidth=.5;for(var g=-maxR;g<=maxR;g+=1){ctx.beginPath();ctx.moveTo(tx(g),pad.top);ctx.lineTo(tx(g),h-pad.bottom);ctx.stroke();ctx.beginPath();ctx.moveTo(pad.left,ty(g));ctx.lineTo(w-pad.right,ty(g));ctx.stroke()}
  var axisColor=isDark?'#cdd6f4':'#1e293b';ctx.strokeStyle=axisColor;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(pad.left,ty(0));ctx.lineTo(w-pad.right,ty(0));ctx.stroke();ctx.beginPath();ctx.moveTo(tx(0),pad.top);ctx.lineTo(tx(0),h-pad.bottom);ctx.stroke();
  ctx.strokeStyle='#00d4ff';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';var drawing=false;
  for(var k=0;k<pts.length;k++){if(pts[k]===null){drawing=false;continue}var px=tx(pts[k].x),py=ty(pts[k].y);if(!drawing){ctx.beginPath();ctx.moveTo(px,py);drawing=true}else ctx.lineTo(px,py)}ctx.stroke();
}
function bindPolarEvents(){
  var input=document.getElementById('polarInput'),btn=document.getElementById('polarBtn');if(!btn)return;
  btn.addEventListener('click',function(){var e=(input?input.value.trim():'')||'sin(3*x)';drawPolar(e,'plotCanvasPolar');var t=document.getElementById('polarTitle');if(t)t.textContent='r(θ) = '+e});
  if(input)input.addEventListener('keydown',function(e){if(e.key==='Enter')btn.click()});
  var pr=document.querySelector('#workspace .presets');if(pr)pr.addEventListener('click',function(e){var b=e.target.closest('button');if(b&&b.dataset.fn){if(input)input.value=b.dataset.fn;btn.click()}});
}

/* ── 分形探索工作区 ── */
function renderFractal(){
  workspace.innerHTML='<div class="workspace-header"><div class="ws-title">❄️ 分形探索</div><div class="ws-desc">Mandelbrot 集与 Julia 集 — 迭代渲染</div></div><div class="work-card"><div class="calc-row" style="margin-bottom:12px"><select id="fractalType"><option value="mandelbrot">Mandelbrot 集</option><option value="julia">Julia 集</option></select><span style="font-size:13px;color:var(--text-muted)">最大迭代:</span><select id="fractalIter"><option>50</option><option selected>100</option><option>200</option><option>300</option></select><button class="btn-calc" id="fractalBtn">渲染</button><span style="font-size:12px;color:var(--text-subtle)">(点击图像放大)</span></div></div><div class="plot-card"><div class="header" id="fractalTitle">Mandelbrot 集</div><canvas id="fractalCanvas" style="cursor:crosshair"></canvas></div>';
  bindFractalEvents();
  setTimeout(function(){renderFractalImg()},100);
}
var fractalState={type:'mandelbrot',cx:-0.5,cy:0,scale:1.5,iter:100};
function renderFractalImg(){
  var canvas=document.getElementById('fractalCanvas');if(!canvas)return;
  var ctx=canvas.getContext('2d'),dpr=window.devicePixelRatio||1,rect=canvas.parentElement.getBoundingClientRect();
  var w=Math.min(rect.width-4,960),h=Math.round(w*0.6);canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.width=w+'px';canvas.style.height=h+'px';
  var img=ctx.createImageData(w,h),data=img.data;
  var s=fractalState,iter=s.iter;
  for(var py=0;py<h;py++){for(var px=0;px<w;px++){var zx,zy,cx,cy;
    if(s.type==='mandelbrot'){zx=0;zy=0;cx=(px-w/2)/(w/2)*s.scale+s.cx;cy=(py-h/2)/(h/2)*s.scale+s.cy}
    else{zx=(px-w/2)/(w/2)*s.scale;zy=(py-h/2)/(h/2)*s.scale;cx=-0.7;cy=0.27}
    var i=0;while(i<iter&&zx*zx+zy*zy<4){var nx=zx*zx-zy*zy+cx;zy=2*zx*zy+cy;zx=nx;i++}
    var idx=(py*w+px)*4;
    if(i===iter){data[idx]=0;data[idx+1]=0;data[idx+2]=0;data[idx+3]=255}
    else{var t=i/iter;data[idx]=Math.floor(9*(1-t)*t*t*t*255);data[idx+1]=Math.floor(15*(1-t)*(1-t)*t*t*255);data[idx+2]=Math.floor(8.5*(1-t)*(1-t)*(1-t)*t*255);data[idx+3]=255}
  }}
  ctx.putImageData(img,0,0);
}
function bindFractalEvents(){
  var btn=document.getElementById('fractalBtn');if(btn)btn.addEventListener('click',function(){fractalState.type=document.getElementById('fractalType').value;fractalState.iter=+document.getElementById('fractalIter').value;fractalState.cx=fractalState.type==='mandelbrot'?-0.5:0;fractalState.cy=0;fractalState.scale=1.5;document.getElementById('fractalTitle').textContent=fractalState.type==='mandelbrot'?'Mandelbrot 集':'Julia 集';renderFractalImg()});
  var canvas=document.getElementById('fractalCanvas');if(canvas)canvas.addEventListener('click',function(e){var rect=canvas.getBoundingClientRect(),w=rect.width,h=rect.height;var mx=(e.clientX-rect.left)/w,my=(e.clientY-rect.top)/h;fractalState.cx+=(mx-0.5)*fractalState.scale*2;fractalState.cy+=(my-0.5)*fractalState.scale*2;fractalState.scale*=0.5;renderFractalImg()});
}

function buildKeyboard(){
  var content=document.getElementById('kbContent');if(!content)return;
  content.innerHTML='';var keys=KB_DATA[currentKb]||[];
  for(var i=0;i<keys.length;i++){var btn=document.createElement('button');btn.textContent=keys[i];btn.addEventListener('click',(function(k){return function(){insertSymbol(k)}})(keys[i]));content.appendChild(btn)}
}

function insertSymbol(sym){
  var activeEl=document.activeElement;
  if(activeEl&&(activeEl.tagName==='INPUT'||activeEl.tagName==='TEXTAREA')){
    var start=activeEl.selectionStart||0,end=activeEl.selectionEnd||0;
    var val=activeEl.value;activeEl.value=val.slice(0,start)+sym+val.slice(end);
    activeEl.selectionStart=activeEl.selectionEnd=start+sym.length;activeEl.focus();
  }
}

document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(currentTab==='calc'&&currentSub===0){
    var k=e.key;
    if(/^[0-9.]$/.test(k)){onCalcBtn(k);return}
    if(k==='+'){onCalcBtn('+');return}if(k==='-'){onCalcBtn('−');return}if(k==='*'){onCalcBtn('×');return}

    if(k==='Backspace'){onCalcBtn('⌫');return}if(k==='Escape'){onCalcBtn('C');return}
  }
});
